kind = "web"
previewPath = "/"
title = "Amplify"
version = "1.0.0"
id = "artifacts/amplify"
router = "path"
deploymentTarget = "vm"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/", "/api" ]
localPort = 5000

[services.development]
run = "bash run.sh"

[services.production]

[services.production.build]
args = ["echo", "no-build"]

[services.production.run]
args = ["python", "app.py"]

[services.production.run.env]
PORT = "5000"

[services.production.health.startup]
path = "/api/health"

[services.env]
PORT = "5000"
