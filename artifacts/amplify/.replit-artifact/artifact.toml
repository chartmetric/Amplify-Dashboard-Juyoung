kind = "web"
previewPath = "/"
title = "Amplify"
version = "1.0.0"
id = "artifacts/amplify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "gunicorn --bind 0.0.0.0:5000 --timeout 120 --workers 1 app:app"

[services.production]

[services.production.build]
args = ["echo", "no-build"]

[services.production.run]
args = ["gunicorn", "--bind", "0.0.0.0:5000", "--timeout", "120", "--workers", "1", "app:app"]

[services.production.run.env]
PORT = "5000"

[services.production.health.startup]
path = "/health"

[services.env]
PORT = "5000"
