<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplify</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1923;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: #141e2a;
            border-bottom: 1px solid #2a3a4a;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: baseline; gap: 12px; }
        .logo { font-size: 22px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; }
        .logo-emoji { margin-right: 4px; }
        .subtitle { font-size: 13px; color: #8899aa; font-weight: 400; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .btn-primary {
            background: #00C9A7; color: #0f1923; border: none; padding: 8px 18px;
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: #00e0bb; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-outline {
            background: transparent; color: #00C9A7; border: 1px solid #00C9A7;
            padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-outline:hover { background: rgba(0,201,167,0.1); }
        .refresh-icon-btn {
            background: transparent; border: 1px solid #2a3a4a; border-radius: 6px;
            color: #8b9ab0; cursor: pointer; padding: 5px 7px; display: inline-flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .refresh-icon-btn:hover { color: #00C9A7; border-color: #00C9A7; background: rgba(0,201,167,0.08); }
        .refresh-icon-btn.spinning svg { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .health-dot { width: 10px; height: 10px; border-radius: 50%; background: #555; display: inline-block; }
        .health-dot.ok { background: #00C9A7; box-shadow: 0 0 6px rgba(0,201,167,0.5); }
        .health-dot.err { background: #ff4d4d; box-shadow: 0 0 6px rgba(255,77,77,0.4); }
        .health-label { font-size: 12px; color: #8899aa; }
        .main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
        }
        .section-title { font-size: 20px; font-weight: 700; color: #ffffff; }
        .controls-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .filter-row { display: flex; align-items: center; gap: 10px; }
        .filter-label { font-size: 13px; color: #8899aa; }
        select { background: #1a2733; color: #e0e0e0; border: 1px solid #2a3a4a; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; outline: none; }
        select:focus { border-color: #00C9A7; }
        .toggle-label {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            font-size: 13px; color: #8899aa; user-select: none;
        }
        .toggle-label input[type=checkbox] { display: none; }
        .toggle-switch {
            width: 34px; height: 18px; background: #2a3a4a; border-radius: 9px;
            position: relative; transition: background 0.2s; flex-shrink: 0;
        }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 14px; height: 14px; border-radius: 50%;
            background: #8899aa; transition: transform 0.2s, background 0.2s;
        }
        input[type=checkbox]:checked + .toggle-switch { background: rgba(0,201,167,0.3); }
        input[type=checkbox]:checked + .toggle-switch::after { transform: translateX(16px); background: #00C9A7; }
        .category-filter-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
        }
        .cat-filter-pill {
            display: inline-flex; align-items: center; gap: 6px; border-radius: 20px;
            padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
            border: 1px solid #2a3a4a; background: transparent; color: #8899aa;
            transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap;
        }
        .cat-filter-pill:hover { border-color: #3a4a5a; color: #c0d0e0; }
        .cat-filter-pill.active { border-color: #00C9A7; color: #00C9A7; background: rgba(0,201,167,0.08); }
        .cat-filter-pill.active-unclassified { border-color: #6b7280; color: #9ca3af; background: rgba(107,114,128,0.12); }
        .cat-pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .progress-bar-wrap { margin-bottom: 14px; display: none; }
        .progress-bar-wrap.visible { display: block; }
        .progress-bar-label { font-size: 12px; color: #8899aa; margin-bottom: 6px; }
        .progress-bar-track { height: 3px; background: #1a2733; border-radius: 99px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #00C9A7; border-radius: 99px; transition: width 0.4s ease; }
        .progress-bar-wrap.fading { opacity: 0; transition: opacity 0.6s ease; }
        .stats-row { display: flex; gap: 8px; margin-bottom: 20px; font-size: 12px; color: #8899aa; flex-wrap: wrap; }
        .stats-row span { background: #1a2733; padding: 4px 10px; border-radius: 6px; border: 1px solid #2a3a4a; }
        .funnel-bar { display: flex; align-items: center; gap: 0; margin-bottom: 20px; flex-wrap: wrap; }
        .funnel-step {
            display: flex; align-items: center; position: relative;
        }
        .funnel-btn {
            background: #1a2733; border: 1px solid #2a3a4a; border-radius: 8px;
            padding: 6px 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: inherit; font-family: inherit;
        }
        .funnel-btn:hover { border-color: #00C9A7; background: rgba(0,201,167,0.05); }
        .funnel-btn.active { border-color: #00C9A7; background: rgba(0,201,167,0.1); }
        .funnel-count { font-size: 16px; font-weight: 700; color: #ffffff; line-height: 1; }
        .funnel-label { font-size: 10px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        .funnel-arrow { font-size: 14px; color: #3a4a5a; padding: 0 6px; flex-shrink: 0; }
        .funnel-tooltip {
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: #0f1923; border: 1px solid #2a3a4a; color: #c0c0c0;
            font-size: 11px; padding: 6px 10px; border-radius: 8px; white-space: nowrap;
            pointer-events: none; z-index: 60; opacity: 0; transition: opacity 0.15s;
            max-width: 260px; white-space: normal; text-align: center; line-height: 1.4;
        }
        .funnel-step:hover .funnel-tooltip { opacity: 1; }
        .load-all-banner {
            background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.3);
            border-radius: 10px; padding: 12px 18px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .load-all-banner-icon { font-size: 18px; flex-shrink: 0; }
        .load-all-banner-text { font-size: 13px; color: #eab308; flex: 1; line-height: 1.4; }
        .btn-load-all {
            background: transparent; color: #00C9A7; border: 1px solid #00C9A7;
            padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: background 0.2s;
        }
        .btn-load-all:hover { background: rgba(0,201,167,0.1); }
        .feature-list { display: flex; flex-direction: column; gap: 12px; }
        .section-divider { margin: 20px 0 12px; display: flex; align-items: center; gap: 12px; }
        .section-divider-label {
            font-size: 12px; font-weight: 600; color: #6b7280;
            text-transform: uppercase; letter-spacing: 0.7px; white-space: nowrap;
        }
        .section-divider-line { flex: 1; height: 1px; background: #2a3a4a; }
        .feature-card {
            background: #1a2733; border: 1px solid #2a3a4a; border-radius: 12px;
            padding: 20px; transition: border-color 0.2s, box-shadow 0.2s, opacity 0.3s; cursor: pointer;
        }
        .feature-card:hover { border-color: #3a4a5a; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .feature-card.expanded { border-color: #00C9A7; box-shadow: 0 4px 24px rgba(0,201,167,0.1); }
        .feature-card.unclassified-card { border-color: #1e2d3a; background: #16212d; opacity: 0.85; }
        .feature-card.unclassified-card:hover { border-color: #2a3a4a; opacity: 1; }
        .feature-card.just-classified { animation: fadeInClassified 0.5s ease-out; }
        @keyframes fadeInClassified {
            from { opacity: 0.5; transform: translateY(4px); border-color: rgba(0,201,167,0.5); }
            to { opacity: 1; transform: translateY(0); border-color: #2a3a4a; }
        }
        .card-top { display: flex; align-items: flex-start; gap: 16px; }
        .score-badge {
            min-width: 44px; height: 44px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-size: 20px; font-weight: 800;
            flex-shrink: 0; cursor: pointer; position: relative; transition: transform 0.1s;
        }
        .score-badge:hover { transform: scale(1.08); }
        .score-5 { background: rgba(0,201,167,0.15); color: #00C9A7; }
        .score-4 { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .score-3 { background: rgba(234,179,8,0.15); color: #eab308; }
        .score-2 { background: rgba(249,115,22,0.15); color: #f97316; }
        .score-1 { background: rgba(107,114,128,0.15); color: #6b7280; }
        .score-0 { background: rgba(107,114,128,0.1); color: #4b5563; }
        .score-unclassified { background: rgba(75,85,99,0.12); color: #4b5563; font-size: 16px; font-weight: 700; }
        .override-indicator {
            position: absolute; top: -4px; right: -4px; font-size: 10px;
            background: #1a2733; border-radius: 50%; width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center; border: 1px solid #2a3a4a;
        }
        .score-popover {
            position: absolute; top: 0; left: 52px; background: #0f1923;
            border: 1px solid #2a3a4a; border-radius: 10px; padding: 6px;
            display: flex; flex-direction: column; gap: 4px; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.2);
        }
        .score-option {
            width: 36px; height: 36px; border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
            font-weight: 800; cursor: pointer; border: 2px solid transparent;
            transition: transform 0.1s, border-color 0.15s;
        }
        .score-option.score-5 { background: #0d3d33; color: #00C9A7; }
        .score-option.score-4 { background: #162a4d; color: #3b82f6; }
        .score-option.score-3 { background: #3a2f0a; color: #eab308; }
        .score-option.score-2 { background: #3d2008; color: #f97316; }
        .score-option.score-1 { background: #1e2328; color: #6b7280; }
        .score-option:hover { transform: scale(1.1); }
        .score-option.active { border-color: #ffffff; }
        .card-body { flex: 1; min-width: 0; }
        .card-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
        .card-title { font-size: 15px; font-weight: 600; color: #ffffff; line-height: 1.3; }
        .chevron { font-size: 12px; color: #8899aa; transition: transform 0.2s; flex-shrink: 0; margin-top: 3px; }
        .feature-card.expanded .chevron { transform: rotate(180deg); }
        .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; position: relative; }
        .category-pill {
            font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 99px;
            text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: opacity 0.15s;
        }
        .category-pill:hover { opacity: 0.8; }
        .cat-new_feature { background: rgba(0,201,167,0.15); color: #00C9A7; }
        .cat-improvement { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .cat-bug_fix { background: rgba(239,68,68,0.15); color: #ef4444; }
        .cat-infrastructure { background: rgba(107,114,128,0.15); color: #6b7280; }
        .cat-mobile { background: rgba(168,85,247,0.15); color: #a855f7; }
        .cat-deprecation { background: rgba(249,115,22,0.15); color: #f97316; }
        .cat-default { background: rgba(107,114,128,0.15); color: #8899aa; }
        .cat-unclassified { background: rgba(75,85,99,0.12); color: #6b7280; font-style: italic; }
        .pre-filter-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: rgba(107,114,128,0.15); color: #6b7280; }
        .auto-classified-pill {
            font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px;
            background: rgba(234,179,8,0.12); color: #eab308; white-space: nowrap; cursor: default;
        }
        .btn-reclassify {
            background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3);
            padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; gap: 4px;
        }
        .btn-reclassify:hover { background: rgba(168,85,247,0.25); }
        .btn-reclassify:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-reclassify .btn-spinner { display: none; width: 12px; height: 12px; border: 2px solid rgba(168,85,247,0.3); border-top-color: #a855f7; border-radius: 50%; animation: spin 0.6s linear infinite; }
        .card-actions { display: flex; align-items: center; gap: 8px; }
        .tier-stat { font-size: 12px; padding: 2px 8px; border-radius: 6px; }
        .tier-auto { background: rgba(234,179,8,0.1); color: #eab308; }
        .tier-ai { background: rgba(0,201,167,0.1); color: #00C9A7; }
        .tier-pending { background: rgba(107,114,128,0.1); color: #6b7280; }
        .source-pill {
            font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px;
            text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
        }
        .source-slack-asana { background: rgba(0,201,167,0.12); color: #00C9A7; }
        .source-slack-only { background: rgba(234,179,8,0.12); color: #eab308; }
        .source-asana-only { background: rgba(249,115,22,0.12); color: #f97316; }
        .version-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(88,166,255,0.1); color: #58a6ff; font-family: 'SF Mono', 'Fira Code', monospace; white-space: nowrap; }
        .prefix-label { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(139,148,158,0.1); color: #8b949e; font-weight: 600; }
        .link-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
        .link-row a { font-size: 12px; color: #58a6ff; text-decoration: none; display: flex; align-items: center; gap: 4px; }
        .link-row a:hover { text-decoration: underline; }
        .no-asana-note { font-size: 11px; color: #6b7280; font-style: italic; margin-top: 6px; }
        .auto-class-note { font-size: 11px; color: #eab308; background: rgba(234,179,8,0.08); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid rgba(234,179,8,0.3); }
        .pagination-controls { margin-top: 20px; }
        .pagination-row {
            display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap;
            padding: 16px 0;
        }
        .pagination-info { font-size: 13px; color: #8899aa; }
        .pg-buttons { display: flex; align-items: center; gap: 4px; }
        .pg-btn {
            background: #1a2733; color: #c0c8d0; border: 1px solid #2a3a4a; padding: 6px 10px;
            border-radius: 6px; font-size: 13px; cursor: pointer; transition: background 0.15s, color 0.15s;
            min-width: 34px; text-align: center;
        }
        .pg-btn:hover:not(.disabled) { background: #243040; color: #ffffff; }
        .pg-btn.pg-active { background: #00C9A7; color: #0f1923; border-color: #00C9A7; font-weight: 700; }
        .pg-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .pg-ellipsis { color: #556677; font-size: 14px; padding: 0 4px; }
        .pagination-perpage select {
            background: #1a2733; color: #c0c8d0; border: 1px solid #2a3a4a; border-radius: 6px;
            padding: 6px 10px; font-size: 12px; cursor: pointer;
        }
        .cat-popover {
            position: absolute; top: 100%; left: 0; margin-top: 6px;
            background: #1a2733; border: 1px solid #2a3a4a; border-radius: 10px;
            padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; z-index: 50;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); min-width: 280px;
        }
        .cat-toggle {
            font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 99px;
            text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
            border: 1px solid #2a3a4a; background: transparent; color: #8899aa;
            transition: all 0.15s; display: flex; align-items: center; gap: 4px;
        }
        .cat-toggle:hover { border-color: #3a4a5a; color: #e0e0e0; }
        .cat-toggle.selected { border-color: transparent; }
        .cat-toggle.selected.sel-new_feature { background: rgba(0,201,167,0.25); color: #00C9A7; border-color: #00C9A7; }
        .cat-toggle.selected.sel-improvement { background: rgba(59,130,246,0.25); color: #3b82f6; border-color: #3b82f6; }
        .cat-toggle.selected.sel-bug_fix { background: rgba(239,68,68,0.25); color: #ef4444; border-color: #ef4444; }
        .cat-toggle.selected.sel-infrastructure { background: rgba(107,114,128,0.25); color: #6b7280; border-color: #6b7280; }
        .cat-toggle.selected.sel-mobile { background: rgba(168,85,247,0.25); color: #a855f7; border-color: #a855f7; }
        .cat-toggle.selected.sel-deprecation { background: rgba(249,115,22,0.25); color: #f97316; border-color: #f97316; }
        .cat-check { font-size: 10px; }
        .card-summary { font-size: 13px; color: #8899aa; line-height: 1.4; margin-bottom: 10px; }
        .card-summary.awaiting { font-style: italic; color: #4b5a6a; }
        .card-bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .channel-pills { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
        .channel-pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid #2a3a4a; color: #8899aa; }
        .btn-generate {
            background: #00C9A7; color: #0f1923; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
            white-space: nowrap; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; flex-shrink: 0;
        }
        .btn-generate:hover { background: #00e0bb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,201,167,0.3); }
        .btn-generate:active { transform: translateY(0); box-shadow: none; }
        .btn-classify-now {
            background: transparent; color: #6b7280; border: 1px solid #2a3a4a;
            padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
            cursor: pointer; white-space: nowrap; transition: border-color 0.2s, color 0.2s, background 0.2s;
            flex-shrink: 0; display: flex; align-items: center; gap: 6px;
        }
        .btn-classify-now:hover { border-color: #00C9A7; color: #00C9A7; background: rgba(0,201,167,0.05); }
        .btn-classify-now:disabled { cursor: not-allowed; opacity: 0.5; }
        .btn-classify-now .btn-spinner {
            width: 12px; height: 12px; border: 2px solid #4b5a6a; border-top-color: #00C9A7;
            border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
        }
        .btn-classify-now.classifying .btn-spinner { display: inline-block; }
        .btn-classify-now.classifying .btn-label { display: none; }
        .card-expanded-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.25s ease-out, opacity 0.2s ease-out; opacity: 0;
        }
        .feature-card.expanded .card-expanded-content {
            max-height: 800px; opacity: 1;
            transition: max-height 0.3s ease-in, opacity 0.25s ease-in;
        }
        .desc-block {
            margin-top: 14px; padding: 12px 16px; border-left: 3px solid #00C9A7;
            background: rgba(0,201,167,0.03); border-radius: 0 8px 8px 0;
            font-size: 14px; color: #e0e0e0; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
        }
        .show-more-link { color: #00C9A7; cursor: pointer; font-size: 13px; margin-top: 6px; display: inline-block; }
        .show-more-link:hover { text-decoration: underline; }
        .meta-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .meta-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: #0f1923; border: 1px solid #2a3a4a; color: #8899aa; }
        .meta-pill.released { border-color: rgba(0,201,167,0.3); color: #00C9A7; }
        .meta-pill.in-progress { border-color: rgba(234,179,8,0.3); color: #eab308; }
        .override-reason-row {
            display: flex; align-items: center; gap: 8px; margin-top: 10px;
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .override-reason-input {
            flex: 1; background: #0f1923; color: #e0e0e0; border: 1px solid #2a3a4a;
            border-radius: 6px; padding: 6px 10px; font-size: 12px; outline: none; font-family: inherit;
        }
        .override-reason-input:focus { border-color: #00C9A7; }
        .btn-save-reason {
            background: #00C9A7; color: #0f1923; border: none; padding: 6px 14px;
            border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .btn-save-reason:hover { background: #00e0bb; }
        .override-confirm { font-size: 11px; color: #00C9A7; margin-top: 6px; animation: fadeOut 2s ease-out forwards; }
        @keyframes fadeOut { 0%,60% { opacity: 1; } 100% { opacity: 0; } }
        .tooltip {
            position: absolute; background: #0f1923; border: 1px solid #2a3a4a; color: #8899aa;
            font-size: 11px; padding: 4px 8px; border-radius: 6px; white-space: nowrap;
            pointer-events: none; z-index: 60; bottom: 100%; left: 50%; transform: translateX(-50%);
            margin-bottom: 4px;
        }
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 16px; }
        .spinner { width: 36px; height: 36px; border: 3px solid #2a3a4a; border-top-color: #00C9A7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #8899aa; }
        .empty-state, .error-state { text-align: center; padding: 60px 20px; }
        .empty-state h3, .error-state h3 { color: #ffffff; font-size: 16px; margin-bottom: 8px; }
        .empty-state p { color: #8899aa; font-size: 13px; }
        .error-state p { color: #ff6b6b; font-size: 13px; }
        .paste-bar {
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
            background: #0f1923; border: 1px solid #2a3a4a; border-radius: 10px;
            padding: 6px 6px 6px 14px; transition: border-color 0.2s;
        }
        .paste-bar:focus-within { border-color: #00C9A7; }
        .paste-input {
            flex: 1; background: transparent; color: #e0e0e0; border: none;
            font-size: 13px; font-family: inherit; outline: none; padding: 8px 0;
        }
        .paste-input::placeholder { color: #4a5a6a; }

        .paste-status {
            font-size: 12px; margin: -6px 0 10px 0; padding: 0 4px;
        }
        .paste-status.loading { color: #8899aa; }
        .paste-status.error { color: #ef4444; }
        .paste-status.success { color: #00C9A7; }
        @keyframes cardHighlight {
            0% { box-shadow: 0 0 0 2px rgba(0,201,167,0.6), 0 0 20px rgba(0,201,167,0.3); }
            100% { box-shadow: none; }
        }
        .feature-card.just-added { animation: cardHighlight 2s ease-out; }
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: #1a2733; border: 1px solid #00C9A7;
            color: #e0e0e0; padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 300;
            opacity: 0; transform: translateY(10px); transition: opacity 0.2s, transform 0.2s; pointer-events: none;
        }
        .toast.visible { opacity: 1; transform: translateY(0); }
        .toast.warning { border-color: #eab308; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo"><span class="logo-emoji">&#9889;</span>Amplify</span>
            <span class="subtitle">Product Marketing Autopilot</span>
        </div>
        <div class="topbar-right">
            <button class="btn-outline" onclick="focusPasteBar()">+ Add Feature</button>
            <div style="display:flex;align-items:center;gap:6px;">
                <span class="health-dot" id="health-dot"></span>
                <span class="health-label" id="health-label">Checking...</span>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="section-header">
            <span class="section-title">Features</span>
            <div class="controls-row">
                <div class="filter-row">
                    <span id="last-refreshed" class="last-refreshed-label" style="font-size:12px;color:#8b9ab0;margin-right:4px;">Loading...</span>
                    <button class="refresh-icon-btn" id="btn-refresh" onclick="manualRefresh()" title="Refresh features from Slack &amp; Asana">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6"/><path d="M2.5 11.5a10 10 0 0 1 18.37-4.5M21.5 12.5a10 10 0 0 1-18.37 4.5"/></svg>
                    </button>
                    <span class="filter-label">Min importance</span>

                        <option value="5">5 only</option>

        <div class="category-filter-row" id="category-filter-row">

            <button class="cat-filter-pill" data-cat="improvement" onclick="setCategoryFilter('improvement', this)">

            </button>
            <button class="cat-filter-pill" data-cat="mobile" onclick="setCategoryFilter('mobile', this)">
                <span class="cat-pill-dot" style="background:#a855f7;"></span>Mobile
            </button>
            <button class="cat-filter-pill" data-cat="deprecation" onclick="setCategoryFilter('deprecation', this)">
                <span class="cat-pill-dot" style="background:#f97316;"></span>Deprecation
            </button>
            <button class="cat-filter-pill" data-cat="bug_fix" onclick="setCategoryFilter('bug_fix', this)">
                <span class="cat-pill-dot" style="background:#ef4444;"></span>Bug Fix
            </button>
            <button class="cat-filter-pill" data-cat="infrastructure" onclick="setCategoryFilter('infrastructure', this)">
                <span class="cat-pill-dot" style="background:#6b7280;"></span>Infrastructure

        <div class="progress-bar-wrap" id="progress-bar-wrap">

        <div id="feature-list" class="feature-list"></div>

            <span class="loading-text">Loading features...</span>

        <div id="error-state" class="error-state" style="display:none;"></div>
