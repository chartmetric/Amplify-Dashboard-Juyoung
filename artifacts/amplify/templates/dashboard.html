<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplify</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1923;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: #141e2a;
            border-bottom: 1px solid #2a3a4a;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .logo-emoji { margin-right: 4px; }
        .subtitle {
            font-size: 13px;
            color: #8899aa;
            font-weight: 400;
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .btn-primary {
            background: #00C9A7;
            color: #0f1923;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: #00e0bb; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-outline {
            background: transparent;
            color: #00C9A7;
            border: 1px solid #00C9A7;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-outline:hover { background: rgba(0,201,167,0.1); }
        .health-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            display: inline-block;
            transition: background 0.3s;
        }
        .health-dot.ok { background: #00C9A7; box-shadow: 0 0 6px rgba(0,201,167,0.5); }
        .health-dot.err { background: #ff4d4d; box-shadow: 0 0 6px rgba(255,77,77,0.4); }
        .health-label {
            font-size: 12px;
            color: #8899aa;
        }
        .main {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
        }
        .filter-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-label {
            font-size: 13px;
            color: #8899aa;
        }
        select {
            background: #1a2733;
            color: #e0e0e0;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #00C9A7; }
        .stats-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #8899aa;
            flex-wrap: wrap;
        }
        .stats-row span {
            background: #1a2733;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #2a3a4a;
        }
        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .feature-card {
            background: #1a2733;
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .feature-card:hover {
            border-color: #3a4a5a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .feature-card.expanded {
            border-color: #00C9A7;
            box-shadow: 0 4px 24px rgba(0,201,167,0.1);
        }
        .card-top {
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .score-badge {
            min-width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            flex-shrink: 0;
        }
        .score-5 { background: rgba(0,201,167,0.15); color: #00C9A7; }
        .score-4 { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .score-3 { background: rgba(234,179,8,0.15); color: #eab308; }
        .score-2 { background: rgba(249,115,22,0.15); color: #f97316; }
        .score-1 { background: rgba(107,114,128,0.15); color: #6b7280; }
        .score-0 { background: rgba(107,114,128,0.1); color: #4b5563; }
        .card-body {
            flex: 1;
            min-width: 0;
        }
        .card-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
        }
        .chevron {
            font-size: 12px;
            color: #8899aa;
            transition: transform 0.2s;
            flex-shrink: 0;
            margin-top: 3px;
        }
        .feature-card.expanded .chevron {
            transform: rotate(180deg);
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .category-pill {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .cat-new_feature { background: rgba(0,201,167,0.15); color: #00C9A7; }
        .cat-improvement { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .cat-bug_fix { background: rgba(239,68,68,0.15); color: #ef4444; }
        .cat-infrastructure { background: rgba(107,114,128,0.15); color: #6b7280; }
        .cat-mobile { background: rgba(168,85,247,0.15); color: #a855f7; }
        .cat-deprecation { background: rgba(249,115,22,0.15); color: #f97316; }
        .cat-default { background: rgba(107,114,128,0.15); color: #8899aa; }
        .pre-filter-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 99px;
            background: rgba(107,114,128,0.15);
            color: #6b7280;
        }
        .card-summary {
            font-size: 13px;
            color: #8899aa;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .card-bottom-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .channel-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }
        .channel-pill {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px;
            border: 1px solid #2a3a4a;
            color: #8899aa;
        }
        .btn-generate {
            background: #00C9A7;
            color: #0f1923;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .btn-generate:hover {
            background: #00e0bb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,201,167,0.3);
        }
        .btn-generate:active { transform: translateY(0); box-shadow: none; }
        .card-expanded-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease-out, opacity 0.2s ease-out;
            opacity: 0;
        }
        .feature-card.expanded .card-expanded-content {
            max-height: 600px;
            opacity: 1;
            transition: max-height 0.3s ease-in, opacity 0.25s ease-in;
        }
        .desc-block {
            margin-top: 14px;
            padding: 12px 16px;
            border-left: 3px solid #00C9A7;
            background: rgba(0,201,167,0.03);
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .show-more-link {
            color: #00C9A7;
            cursor: pointer;
            font-size: 13px;
            margin-top: 6px;
            display: inline-block;
        }
        .show-more-link:hover { text-decoration: underline; }
        .meta-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .meta-pill {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 99px;
            background: #0f1923;
            border: 1px solid #2a3a4a;
            color: #8899aa;
        }
        .meta-pill.released { border-color: rgba(0,201,167,0.3); color: #00C9A7; }
        .meta-pill.in-progress { border-color: rgba(234,179,8,0.3); color: #eab308; }
        .override-link {
            font-size: 12px;
            color: #8899aa;
            cursor: pointer;
            margin-top: 12px;
            display: inline-block;
            transition: color 0.15s;
        }
        .override-link:hover { color: #00C9A7; }
        .override-form {
            margin-top: 12px;
            padding: 14px;
            background: #0f1923;
            border: 1px solid #2a3a4a;
            border-radius: 10px;
        }
        .override-form .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .override-form label {
            font-size: 12px;
            color: #8899aa;
            min-width: 70px;
        }
        .override-form select, .override-form input {
            background: #1a2733;
            color: #e0e0e0;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }
        .override-form select:focus, .override-form input:focus { border-color: #00C9A7; }
        .override-form input { flex: 1; min-width: 180px; }
        .override-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-save-override {
            background: #00C9A7;
            color: #0f1923;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save-override:hover { background: #00e0bb; }
        .btn-cancel-override {
            background: transparent;
            color: #8899aa;
            border: 1px solid #2a3a4a;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-cancel-override:hover { background: rgba(255,255,255,0.05); }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a2733;
            border: 1px solid #00C9A7;
            color: #e0e0e0;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 300;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.warning { border-color: #eab308; }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
            gap: 16px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2a3a4a;
            border-top-color: #00C9A7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 14px;
            color: #8899aa;
        }
        .empty-state, .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state h3, .error-state h3 {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .empty-state p, .error-state p {
            color: #8899aa;
            font-size: 13px;
        }
        .error-state p { color: #ff6b6b; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1a2733;
            border: 1px solid #2a3a4a;
            border-radius: 14px;
            padding: 28px;
            width: 90%;
            max-width: 540px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .modal label {
            display: block;
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 6px;
            margin-top: 14px;
        }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            background: #0f1923;
            color: #e0e0e0;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }
        .modal input:focus, .modal textarea:focus { border-color: #00C9A7; }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .category-filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .cat-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #2a3a4a;
            background: transparent;
            color: #8899aa;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .cat-pill:hover { border-color: #3a4a5a; color: #e0e0e0; }
        .cat-pill-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cat-pill.active-all {
            background: #2a3a4a;
            color: #ffffff;
            border-color: #3a4a5a;
        }
        .cat-pill.active-new_feature { background: #00C9A7; color: #ffffff; border-color: #00C9A7; }
        .cat-pill.active-improvement { background: #3b82f6; color: #ffffff; border-color: #3b82f6; }
        .cat-pill.active-bug_fix { background: #ef4444; color: #ffffff; border-color: #ef4444; }
        .cat-pill.active-infrastructure { background: #6b7280; color: #ffffff; border-color: #6b7280; }
        .cat-pill.active-mobile { background: #a855f7; color: #ffffff; border-color: #a855f7; }
        .cat-pill.active-deprecation { background: #f97316; color: #ffffff; border-color: #f97316; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo"><span class="logo-emoji">&#9889;</span>Amplify</span>
            <span class="subtitle">Product Marketing Autopilot</span>
        </div>
        <div class="topbar-right">
            <button class="btn-outline" onclick="openManualInput()">Manual Input</button>
            <div style="display:flex;align-items:center;gap:6px;">
                <span class="health-dot" id="health-dot"></span>
                <span class="health-label" id="health-label">Checking...</span>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="section-header">
            <span class="section-title">Features</span>
            <div class="filter-row">
                <span class="filter-label">Min importance</span>
                <select id="importance-filter" onchange="loadFeatures()">
                    <option value="5">5 only</option>
                    <option value="4">4+</option>
                    <option value="3" selected>3+</option>
                    <option value="2">2+</option>
                    <option value="1">1+</option>
                </select>
            </div>
        </div>

        <div class="stats-row" id="stats-row" style="display:none;"></div>

        <div class="category-filter-row" id="category-filter-row" style="display:none;">
            <button class="cat-pill active-all" data-cat="all" onclick="filterByCategory('all')">
                <span class="cat-pill-dot" style="background:#8899aa;"></span>
                <span class="cat-pill-label">All</span>
            </button>
            <button class="cat-pill" data-cat="new_feature" onclick="filterByCategory('new_feature')">
                <span class="cat-pill-dot" style="background:#00C9A7;"></span>
                <span class="cat-pill-label">New Feature</span>
            </button>
            <button class="cat-pill" data-cat="improvement" onclick="filterByCategory('improvement')">
                <span class="cat-pill-dot" style="background:#3b82f6;"></span>
                <span class="cat-pill-label">Improvement</span>
            </button>
            <button class="cat-pill" data-cat="bug_fix" onclick="filterByCategory('bug_fix')">
                <span class="cat-pill-dot" style="background:#ef4444;"></span>
                <span class="cat-pill-label">Bug Fix</span>
            </button>
            <button class="cat-pill" data-cat="infrastructure" onclick="filterByCategory('infrastructure')">
                <span class="cat-pill-dot" style="background:#6b7280;"></span>
                <span class="cat-pill-label">Infrastructure</span>
            </button>
            <button class="cat-pill" data-cat="mobile" onclick="filterByCategory('mobile')">
                <span class="cat-pill-dot" style="background:#a855f7;"></span>
                <span class="cat-pill-label">Mobile</span>
            </button>
            <button class="cat-pill" data-cat="deprecation" onclick="filterByCategory('deprecation')">
                <span class="cat-pill-dot" style="background:#f97316;"></span>
                <span class="cat-pill-label">Deprecation</span>
            </button>
        </div>

        <div id="feature-list" class="feature-list"></div>

        <div id="loading" class="loading-container" style="display:none;">
            <div class="spinner"></div>
            <span class="loading-text">Classifying features with AI...</span>
        </div>

        <div id="empty-state" class="empty-state" style="display:none;"></div>
        <div id="error-state" class="error-state" style="display:none;"></div>
    </div>

    <div class="modal-overlay" id="manual-modal">
        <div class="modal">
            <h2>Manual Feature Input</h2>
            <label>Title</label>
            <input type="text" id="manual-title" placeholder="e.g. New Artist Discovery Page">
            <label>Description</label>
            <textarea id="manual-desc" placeholder="Describe the feature and its user impact..."></textarea>
            <label>Category</label>
            <select id="manual-category">
                <option value="new_feature">New Feature</option>
                <option value="improvement">Improvement</option>
                <option value="mobile">Mobile</option>
                <option value="deprecation">Deprecation</option>
            </select>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeManualInput()">Cancel</button>
                <button class="btn-primary" onclick="submitManualInput()">Add Feature</button>
            </div>
        </div>
    </div>

<script>
var allFeatures = [];
var currentRequest = null;
var expandedIdx = -1;
var selectedCategory = 'all';

function checkHealth() {
    fetch('/api/health')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            document.getElementById('health-dot').className = 'health-dot ok';
            document.getElementById('health-label').textContent = 'Healthy';
        })
        .catch(function() {
            document.getElementById('health-dot').className = 'health-dot err';
            document.getElementById('health-label').textContent = 'Error';
        });
}

function loadFeatures() {
    var minImp = document.getElementById('importance-filter').value;
    var list = document.getElementById('feature-list');
    var loading = document.getElementById('loading');
    var empty = document.getElementById('empty-state');
    var errEl = document.getElementById('error-state');
    var stats = document.getElementById('stats-row');

    list.innerHTML = '';
    empty.style.display = 'none';
    errEl.style.display = 'none';
    stats.style.display = 'none';
    document.getElementById('category-filter-row').style.display = 'none';
    loading.style.display = 'flex';
    expandedIdx = -1;
    selectedCategory = 'all';

    if (currentRequest) { currentRequest.abort(); }
    var controller = new AbortController();
    currentRequest = controller;

    fetch('/api/features/classified?limit=40&min_importance=' + minImp, { signal: controller.signal })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            currentRequest = null;
            loading.style.display = 'none';
            if (data.error) throw new Error(data.error);
            allFeatures = data.classified_features || [];

            stats.innerHTML =
                '<span>Total enriched: ' + (data.total_enriched || 0) + '</span>' +
                '<span>Sent to Claude: ' + (data.sent_to_claude || '?') + '</span>' +
                '<span>Pre-filtered: ' + (data.pre_filtered_skipped || 0) + '</span>' +
                '<span>Showing: ' + allFeatures.length + '</span>';
            stats.style.display = 'flex';

            if (allFeatures.length === 0) {
                empty.innerHTML = '<h3>No features found above importance level ' + minImp + '</h3><p>Try lowering the minimum importance filter.</p>';
                empty.style.display = 'block';
                return;
            }
            updateCategoryPills();
            document.getElementById('category-filter-row').style.display = 'flex';
            renderFeatures();
        })
        .catch(function(err) {
            currentRequest = null;
            loading.style.display = 'none';
            if (err.name === 'AbortError') return;
            errEl.innerHTML = '<h3>Failed to load features</h3><p>' + err.message + '</p>';
            errEl.style.display = 'block';
        });
}

function toggleCard(idx) {
    var cards = document.querySelectorAll('.feature-card');
    if (expandedIdx === idx) {
        cards[idx].classList.remove('expanded');
        expandedIdx = -1;
        return;
    }
    if (expandedIdx >= 0 && expandedIdx < cards.length) {
        cards[expandedIdx].classList.remove('expanded');
    }
    cards[idx].classList.add('expanded');
    expandedIdx = idx;
}

function buildDescBlock(f) {
    var desc = f.description || '';
    if (!desc) return '';
    var truncated = desc.length > 500;
    var displayDesc = truncated ? desc.substring(0, 500) + '...' : desc;
    var html = '<div class="desc-block">' +
        '<span class="desc-text">' + escHtml(displayDesc) + '</span>';
    if (truncated) {
        html += '<br><span class="show-more-link" data-full="' + escAttr(desc) + '">Show more...</span>';
    }
    html += '</div>';
    return html;
}

function buildMetaPills(f) {
    var pills = [];
    var releaseStatus = f.release_status;
    if (releaseStatus) {
        if (releaseStatus === 'released' || releaseStatus === 'completed') {
            pills.push('<span class="meta-pill released">Released &#10003;</span>');
        } else {
            pills.push('<span class="meta-pill in-progress">In Progress</span>');
        }
    }
    if (f.release_date) {
        pills.push('<span class="meta-pill">' + escHtml(f.release_date) + '</span>');
    }
    var reactions = f.total_reactions || 0;
    if (reactions > 0) {
        pills.push('<span class="meta-pill">&#128640; ' + reactions + ' reactions</span>');
    }
    if (f.engineer) {
        pills.push('<span class="meta-pill">Eng: ' + escHtml(f.engineer) + '</span>');
    }
    if (f.assignee) {
        pills.push('<span class="meta-pill">Assignee: ' + escHtml(f.assignee) + '</span>');
    }
    if (f.urgency_score) {
        pills.push('<span class="meta-pill">Urgency: ' + f.urgency_score + '</span>');
    }
    if (pills.length === 0) return '';
    return '<div class="meta-pills">' + pills.join('') + '</div>';
}

var CAT_DEFINITIONS = [
    { key: 'all',            label: 'All',            color: '#8899aa' },
    { key: 'new_feature',    label: 'New Feature',    color: '#00C9A7' },
    { key: 'improvement',    label: 'Improvement',    color: '#3b82f6' },
    { key: 'bug_fix',        label: 'Bug Fix',        color: '#ef4444' },
    { key: 'infrastructure', label: 'Infrastructure', color: '#6b7280' },
    { key: 'mobile',         label: 'Mobile',         color: '#a855f7' },
    { key: 'deprecation',    label: 'Deprecation',    color: '#f97316' }
];

function updateCategoryPills() {
    var counts = {};
    allFeatures.forEach(function(f) {
        var cat = (f.classification && f.classification.category) || 'unknown';
        counts[cat] = (counts[cat] || 0) + 1;
    });
    var pills = document.querySelectorAll('#category-filter-row .cat-pill');
    pills.forEach(function(pill) {
        var cat = pill.getAttribute('data-cat');
        var labelEl = pill.querySelector('.cat-pill-label');
        var def = CAT_DEFINITIONS.find(function(d) { return d.key === cat; });
        var baseLabel = def ? def.label : cat;
        var count = cat === 'all' ? allFeatures.length : (counts[cat] || 0);
        labelEl.textContent = baseLabel + ' (' + count + ')';
        pill.className = 'cat-pill' + (selectedCategory === cat ? ' active-' + cat : '');
    });
}

function filterByCategory(cat) {
    selectedCategory = cat;
    expandedIdx = -1;
    updateCategoryPills();
    renderFeatures();
}

function renderFeatures() {
    var list = document.getElementById('feature-list');
    list.innerHTML = '';
    var features = selectedCategory === 'all'
        ? allFeatures
        : allFeatures.filter(function(f) {
            return (f.classification && f.classification.category) === selectedCategory;
        });
    features.forEach(function(f, renderIdx) {
        var dataIdx = allFeatures.indexOf(f);
        var c = f.classification || {};
        var score = c.importance_score || 0;
        var cat = c.category || 'unknown';
        var summary = c.marketing_summary || '';
        var channels = c.recommended_channels || [];
        var preFiltered = c.pre_filtered || false;

        var catClass = 'cat-' + cat;
        if (['new_feature','improvement','bug_fix','infrastructure','mobile','deprecation'].indexOf(cat) === -1) {
            catClass = 'cat-default';
        }

        var channelHtml = '';
        channels.forEach(function(ch) {
            channelHtml += '<span class="channel-pill">' + ch + '</span>';
        });

        var card = document.createElement('div');
        card.className = 'feature-card';
        card.innerHTML =
            '<div class="card-top">' +
                '<div class="score-badge score-' + Math.min(score, 5) + '">' + score + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title-row">' +
                        '<span class="card-title">' + escHtml(f.title || 'Untitled') + '</span>' +
                        '<span class="chevron">&#9660;</span>' +
                    '</div>' +
                    '<div class="card-meta">' +
                        '<span class="category-pill ' + catClass + '">' + cat.replace(/_/g, ' ') + '</span>' +
                        (preFiltered ? '<span class="pre-filter-badge">pre-filtered</span>' : '') +
                    '</div>' +
                    (summary ? '<div class="card-summary">' + escHtml(summary) + '</div>' : '') +
                    '<div class="card-bottom-row">' +
                        '<div class="channel-pills">' + channelHtml + '</div>' +
                        '<button class="btn-generate" data-idx="' + renderIdx + '">Generate Content &rarr;</button>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            '<div class="card-expanded-content">' +
                buildDescBlock(f) +
                buildMetaPills(f) +
                '<span class="override-link" data-idx="' + dataIdx + '">&#9998; Edit Classification</span>' +
            '</div>';

        card.addEventListener('click', function(e) {
            if (e.target.closest('.btn-generate') || e.target.closest('.show-more-link') || e.target.closest('.override-link') || e.target.closest('.override-form')) return;
            toggleCard(renderIdx);
        });

        card.querySelector('.override-link').addEventListener('click', function(e) {
            e.stopPropagation();
            showOverrideForm(dataIdx);
        });

        card.querySelector('.btn-generate').addEventListener('click', function(e) {
            e.stopPropagation();
            generateContentForFeature(renderIdx, f);
        });

        var showMore = card.querySelector('.show-more-link');
        if (showMore) {
            showMore.addEventListener('click', function(e) {
                e.stopPropagation();
                var fullText = this.getAttribute('data-full');
                var descText = this.parentElement.querySelector('.desc-text');
                if (this.textContent === 'Show more...') {
                    descText.textContent = fullText;
                    this.textContent = 'Show less';
                } else {
                    descText.textContent = fullText.substring(0, 500) + '...';
                    this.textContent = 'Show more...';
                }
            });
        }

        list.appendChild(card);
    });
}

function generateContentForFeature(renderIdx, feature) {
    var channels = (feature.classification || {}).recommended_channels || [];
    if (channels.length === 0) {
        channels = ['twitter', 'linkedin', 'inapp'];
    }
    var btn = document.querySelectorAll('.btn-generate')[renderIdx];
    var origText = btn.innerHTML;
    btn.innerHTML = 'Generating...';
    btn.disabled = true;

    fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ feature: feature, channels: channels })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.innerHTML = origText;
        btn.disabled = false;
        if (data.error) {
            alert('Generation failed: ' + data.error);
            return;
        }
        alert('Content generated for ' + channels.join(', ') + '! Check /test/review for full editing.');
    })
    .catch(function(err) {
        btn.innerHTML = origText;
        btn.disabled = false;
        alert('Error: ' + err.message);
    });
}

function generateContent(idx) {
    generateContentForFeature(idx, allFeatures[idx]);
}

function escHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function escAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function openManualInput() {
    document.getElementById('manual-modal').classList.add('open');
}
function closeManualInput() {
    document.getElementById('manual-modal').classList.remove('open');
}
function submitManualInput() {
    var title = document.getElementById('manual-title').value.trim();
    var desc = document.getElementById('manual-desc').value.trim();
    var cat = document.getElementById('manual-category').value;
    if (!title) { alert('Please enter a title'); return; }

    var btn = document.querySelector('.modal-actions .btn-primary');
    btn.textContent = 'Adding...';
    btn.disabled = true;

    fetch('/api/sources/manual/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ title: title, description: desc, category: cat })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.textContent = 'Add Feature';
        btn.disabled = false;
        if (data.error) { alert('Error: ' + data.error); return; }
        closeManualInput();
        document.getElementById('manual-title').value = '';
        document.getElementById('manual-desc').value = '';
        loadFeatures();
    })
    .catch(function(err) {
        btn.textContent = 'Add Feature';
        btn.disabled = false;
        alert('Error: ' + err.message);
    });
}

function showToast(msg, isWarning) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast visible' + (isWarning ? ' warning' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.className = 'toast'; }, 3000);
}

function showOverrideForm(idx) {
    var card = document.querySelectorAll('.feature-card')[idx];
    var existing = card.querySelector('.override-form');
    if (existing) { existing.remove(); return; }

    var f = allFeatures[idx];
    var c = f.classification || {};
    var cats = ['new_feature','improvement','bug_fix','infrastructure','mobile','deprecation'];

    var catOptions = cats.map(function(ct) {
        return '<option value="' + ct + '"' + (ct === c.category ? ' selected' : '') + '>' + ct.replace(/_/g, ' ') + '</option>';
    }).join('');
    var scoreOptions = [1,2,3,4,5].map(function(s) {
        return '<option value="' + s + '"' + (s === c.importance_score ? ' selected' : '') + '>' + s + '</option>';
    }).join('');

    var formDiv = document.createElement('div');
    formDiv.className = 'override-form';
    formDiv.innerHTML =
        '<div class="form-row">' +
            '<label>Score</label>' +
            '<select class="ovr-score">' + scoreOptions + '</select>' +
            '<label>Category</label>' +
            '<select class="ovr-cat">' + catOptions + '</select>' +
        '</div>' +
        '<div class="form-row">' +
            '<label>Reason</label>' +
            '<input type="text" class="ovr-reason" placeholder="Why this change? (optional, helps AI learn)">' +
        '</div>' +
        '<div class="override-actions">' +
            '<button class="btn-save-override">Save Override</button>' +
            '<button class="btn-cancel-override">Cancel</button>' +
        '</div>';

    var expandedContent = card.querySelector('.card-expanded-content');
    expandedContent.appendChild(formDiv);

    formDiv.querySelector('.btn-cancel-override').addEventListener('click', function(e) {
        e.stopPropagation();
        formDiv.remove();
    });

    formDiv.querySelector('.btn-save-override').addEventListener('click', function(e) {
        e.stopPropagation();
        var newScore = parseInt(formDiv.querySelector('.ovr-score').value);
        var newCat = formDiv.querySelector('.ovr-cat').value;
        var reason = formDiv.querySelector('.ovr-reason').value.trim();

        var btn = formDiv.querySelector('.btn-save-override');
        btn.textContent = 'Saving...';
        btn.disabled = true;

        var payload = {
            feature_id: f.id || f.feature_id || '',
            feature_title: f.title || '',
            original_classification: {
                category: c.category,
                importance_score: c.importance_score,
                is_user_facing: c.is_user_facing,
                target_audience: c.target_audience,
                recommended_channels: c.recommended_channels,
                marketing_summary: c.marketing_summary
            },
            override_classification: {
                category: newCat,
                importance_score: newScore
            },
            reason: reason
        };

        fetch('/api/classification/override', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { alert('Error: ' + data.error); btn.textContent = 'Save Override'; btn.disabled = false; return; }

            c.importance_score = newScore;
            c.category = newCat;
            c.recommended_channels = data.recommended_channels || [];
            c.manual_override = true;
            f.classification = c;

            formDiv.remove();

            var minImp = parseInt(document.getElementById('importance-filter').value);
            if (newScore < minImp) {
                showToast('Feature moved out of current filter view', true);
            } else {
                showToast('Classification updated \u2014 AI will learn from this');
            }

            allFeatures.sort(function(a, b) {
                return (b.classification || {}).importance_score - (a.classification || {}).importance_score;
            });
            expandedIdx = -1;
            renderFeatures();
        })
        .catch(function(err) {
            btn.textContent = 'Save Override';
            btn.disabled = false;
            alert('Error: ' + err.message);
        });
    });

    formDiv.addEventListener('click', function(e) { e.stopPropagation(); });
}

checkHealth();
loadFeatures();
</script>
<div class="toast" id="toast"></div>
</body>
</html>
