    <div class="toast" id="toast"></div>

<script>
var allFeatures = [];
var expandedId = null;
var categoryFilter = 'all';
var pollInterval = null;
var classificationTotal = 0;
var classificationDone = 0;
var activePopover = null;
var currentRequest = null;
var currentPage = 1;
var perPage = 25;
var ALL_CATS = ['new_feature','improvement','bug_fix','infrastructure','mobile','deprecation'];
var CAT_LABELS = {new_feature:'New Feature',improvement:'Improvement',bug_fix:'Bug Fix',infrastructure:'Infrastructure',mobile:'Mobile',deprecation:'Deprecation'};
var CAT_COLORS = {new_feature:'#00C9A7',improvement:'#3b82f6',bug_fix:'#ef4444',infrastructure:'#6b7280',mobile:'#a855f7',deprecation:'#f97316'};
var SCORE_COLORS = {5:'#00C9A7',4:'#3b82f6',3:'#eab308',2:'#f97316',1:'#6b7280',0:'#4b5563'};
var currentFunnelData = null;
var lastRefreshedTs = null;
var autoRefreshInterval = null;
var AUTO_REFRESH_MS = 5 * 60 * 1000;
var isAllTasksMode = false;

function getCategories(f) {
    var c = f.classification || {};
    if (c.categories && c.categories.length > 0) return c.categories.slice();
    if (c.category) return [c.category];
    return ['unknown'];
}

function featureMatchesCategory(f, cat) {
    if (cat === 'all') return true;
    return getCategories(f).indexOf(cat) !== -1;
}

function closeActivePopover() {
    if (activePopover) {
        if (activePopover._commitOnClose) activePopover._commitOnClose();
        activePopover.remove();
        activePopover = null;
    }
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.score-popover') && !e.target.closest('.score-badge') &&
        !e.target.closest('.cat-popover') && !e.target.closest('.category-pill') &&
        !e.target.closest('.card-meta')) {
        closeActivePopover();
    }
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeActivePopover(); });

function checkHealth() {
    fetch('/api/health').then(function(r){return r.json();}).then(function(){
        document.getElementById('health-dot').className='health-dot ok';
        document.getElementById('health-label').textContent='Healthy';
    }).catch(function(){
        document.getElementById('health-dot').className='health-dot err';
        document.getElementById('health-label').textContent='Error';
    });
}

function renderFunnelBar(data, activeStep) {
    var bar = document.getElementById('funnel-bar');
    if (!data) { bar.style.display = 'none'; return; }
    var feats = data.features || data.classified_features || allFeatures || [];
    var totalAsana = data.total || data.total_enriched || data.total_from_asana || feats.length;
    var classifiedCount = 0;
    for (var i = 0; i < feats.length; i++) {
        if (feats[i].classification && !feats[i].classification.unclassified) classifiedCount++;
    }
    var sentToClaude = data.sent_to_claude || data.sent_to_claude_count || classifiedCount;
    var showingCount = data.filtered || data.showing_count || feats.length;

    var steps = [
        {
            id: 'total',
            count: totalAsana,
            label: 'Total Features Released in the last 30 days',
            tooltip: 'Total number of features released in the last 30 days. Click to load every feature unclassified.',
            clickable: true,
        },
        {
            id: 'claude',
            count: sentToClaude,
            label: 'Sent to Claude',
            tooltip: 'Tasks that passed the pre-filter and were sent to Claude for AI classification. Pre-filter excludes tasks matching bug/fix/refactor/internal keywords or with no keyword signal.',
            clickable: true,
        },
        {
            id: 'classified',
            count: classifiedCount,
            label: 'Classified',
            tooltip: 'Tasks that received a classification from Claude, including pre-filtered tasks with assigned scores. Click to reset category filter to All.',
            clickable: true,
        },
        {
            id: 'showing',
            count: showingCount,
            label: 'Showing',
            tooltip: 'Features passing the current importance filter and category selection. This is the current view.',
            clickable: false,
        },
    ];

    bar.innerHTML = '';
    steps.forEach(function(step, i) {
        var stepEl = document.createElement('div');
        stepEl.className = 'funnel-step';

        var btn = document.createElement('button');
        btn.className = 'funnel-btn' + (step.id === activeStep ? ' active' : '');
        btn.disabled = !step.clickable;
        btn.style.cursor = step.clickable ? 'pointer' : 'default';
        btn.innerHTML =
            '<span class="funnel-count">' + step.count + '</span>' +
            '<span class="funnel-label">' + step.label + '</span>';

        if (step.clickable) {
            btn.addEventListener('click', function() { onFunnelClick(step.id); });
        }

        var tooltip = document.createElement('div');
        tooltip.className = 'funnel-tooltip';
        tooltip.textContent = step.tooltip;

        stepEl.appendChild(btn);
        stepEl.appendChild(tooltip);
        bar.appendChild(stepEl);

        if (i < steps.length - 1) {
            var arrow = document.createElement('span');
            arrow.className = 'funnel-arrow';
            arrow.textContent = '\u2192';
            bar.appendChild(arrow);
        }
    });
    bar.style.display = 'flex';
}

function onFunnelClick(stepId) {
    if (stepId === 'total') {
        manualRefresh();
    } else if (stepId === 'claude') {
        loadFeaturesSentToClaude();
    } else if (stepId === 'classified') {
        setCategoryFilter('all', document.querySelector('.cat-filter-pill[data-cat="all"]'));
        if (currentFunnelData) renderFunnelBar(currentFunnelData, 'classified');
    }
}

function loadAllAsanaTasks() {
    var list = document.getElementById('feature-list');
    var loading = document.getElementById('loading');
    var empty = document.getElementById('empty-state');
    var errEl = document.getElementById('error-state');
    isAllTasksMode = true;
    list.innerHTML = '';
    empty.style.display = 'none';
    errEl.style.display = 'none';
    document.getElementById('category-filter-row').style.display = 'none';
    document.getElementById('load-all-banner').style.display = 'flex';
    loading.style.display = 'flex';
    document.getElementById('loading').querySelector('.loading-text').textContent = 'Fetching all Asana tasks...';
    expandedId = null;
    categoryFilter = 'all';
    if (currentRequest) { currentRequest.abort(); }
    var controller = new AbortController();
    currentRequest = controller;
    fetch('/api/features/all-raw', { signal: controller.signal })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            currentRequest = null;
            loading.style.display = 'none';
            document.getElementById('loading').querySelector('.loading-text').textContent = 'Classifying features with AI...';
            if (data.error) throw new Error(data.error);
            allFeatures = data.features || [];
            var funnelData = {
                total_enriched: data.total || 0,
                sent_to_claude: 0,
                classified_count: 0,
                filtered: allFeatures.length,
            };
            currentFunnelData = funnelData;
            renderFunnelBar(funnelData, 'total');
            if (allFeatures.length === 0) {
                empty.innerHTML = '<h3>No tasks found</h3><p>No features returned from Asana.</p>';
                empty.style.display = 'block';
                return;
            }
            renderAll();
        })
        .catch(function(err) {
            currentRequest = null;
            loading.style.display = 'none';
            document.getElementById('loading').querySelector('.loading-text').textContent = 'Classifying features with AI...';
            isAllTasksMode = false;
            document.getElementById('load-all-banner').style.display = 'none';
            if (err.name === 'AbortError') return;
            errEl.innerHTML = '<h3>Failed to load all tasks</h3><p>' + err.message + '</p>';
            errEl.style.display = 'block';
        });
}

function loadFeaturesSentToClaude() {
    var minImp = document.getElementById('importance-filter').value;
    var list = document.getElementById('feature-list');
    var loading = document.getElementById('loading');
    var empty = document.getElementById('empty-state');
    var errEl = document.getElementById('error-state');
    isAllTasksMode = false;
    list.innerHTML = '';
    empty.style.display = 'none';
    errEl.style.display = 'none';
    document.getElementById('load-all-banner').style.display = 'none';
    loading.style.display = 'flex';
    expandedId = null;
    categoryFilter = 'all';
    if (currentRequest) { currentRequest.abort(); }
    var controller = new AbortController();
    currentRequest = controller;
    currentPage = 1;
    fetch('/api/features/classified?limit=500&min_importance=1', { signal: controller.signal })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            currentRequest = null;
            loading.style.display = 'none';
            if (data.error) throw new Error(data.error);
            allFeatures = (data.classified_features || []).filter(function(f) {
                return !(f.classification || {}).pre_filtered;
            });
            currentFunnelData = data;
            renderFunnelBar(data, 'claude');
            if (allFeatures.length === 0) {
                empty.innerHTML = '<h3>No features sent to Claude</h3><p>All features were filtered before reaching Claude.</p>';
                empty.style.display = 'block';
                return;
            }
            document.getElementById('category-filter-row').style.display = 'flex';
            renderAll();
        })
        .catch(function(err) {
            currentRequest = null;
            loading.style.display = 'none';
            if (err.name === 'AbortError') return;
            errEl.innerHTML = '<h3>Failed to load features</h3><p>' + err.message + '</p>';
            errEl.style.display = 'block';
        });
}

function loadFeatures() {
    var list = document.getElementById('feature-list');
    var loading = document.getElementById('loading');
    var empty = document.getElementById('empty-state');
    var errEl = document.getElementById('error-state');
    var stats = document.getElementById('stats-row');
    var funnelBar = document.getElementById('funnel-bar');
    var loadAllBanner = document.getElementById('load-all-banner');
    isAllTasksMode = false;
    list.innerHTML = '';
    empty.style.display = 'none';
    errEl.style.display = 'none';
    if (stats) stats.style.display = 'none';
    if (funnelBar) funnelBar.style.display = 'none';
    if (loadAllBanner) loadAllBanner.style.display = 'none';
    loading.style.display = 'flex';
    expandedId = null;
    allFeatures = [];
    stopPolling();
    hideProgressBar();

    currentPage = 1;
    fetch('/api/features/all')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            loading.style.display = 'none';
            if (data.error) throw new Error(data.error);

            allFeatures = data.features || data.classified_features || [];
            currentFunnelData = data;
            if (data.last_refreshed) {
                lastRefreshedTs = data.last_refreshed * 1000;
                updateLastRefreshedLabel();
            }
            startAutoRefreshTimer();
            if (stats) {
                var tierCounts = countTiers();
                stats.innerHTML =
                    '<span>Features: ' + allFeatures.length + ' total</span>' +
                    '<span id="stat-auto-skipped" class="tier-stat tier-auto">' + tierCounts.autoSkipped + ' auto-skipped</span>' +
                    '<span id="stat-ai-classified" class="tier-stat tier-ai">' + tierCounts.aiClassified + ' AI-classified</span>' +
                    '<span id="stat-unclassified" class="tier-stat tier-pending">' + tierCounts.unclassified + ' pending</span>';
                stats.style.display = 'flex';
            }
            updateTierStats();
            if (typeof renderFunnelBar === 'function') renderFunnelBar(data, 'showing');
            if (allFeatures.length === 0) {
                empty.innerHTML = '<h3>No features found</h3><p>Try refreshing or check your data sources.</p>';
                empty.style.display = 'block';
                return;
            }

            renderAll();
            startBatchClassification();
        })
        .catch(function(err) {
            loading.style.display = 'none';
            errEl.innerHTML = '<h3>Failed to load features</h3><p>' + err.message + '</p>';
            errEl.style.display = 'block';
        });
}

function formatTimeAgo(ts) {
    var diff = Date.now() - ts;
    var secs = Math.floor(diff / 1000);
    if (secs < 60) return 'just now';
    var mins = Math.floor(secs / 60);
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function updateLastRefreshedLabel() {
    var el = document.getElementById('last-refreshed');
    if (!el || !lastRefreshedTs) return;
    el.textContent = 'Updated ' + formatTimeAgo(lastRefreshedTs);
    el.title = 'Last synced: ' + new Date(lastRefreshedTs).toLocaleString();
}

setInterval(function() { if (lastRefreshedTs) updateLastRefreshedLabel(); }, 30000);

function manualRefresh() {
    var btn = document.getElementById('btn-refresh');
    if (btn) btn.classList.add('spinning');
    var list = document.getElementById('feature-list');
    var loading = document.getElementById('loading');
    var empty = document.getElementById('empty-state');
    var errEl = document.getElementById('error-state');
    var stats = document.getElementById('stats-row');
    var funnelBar = document.getElementById('funnel-bar');
    var loadAllBanner = document.getElementById('load-all-banner');
    isAllTasksMode = false;
    list.innerHTML = '';
    empty.style.display = 'none';
    errEl.style.display = 'none';
    if (stats) stats.style.display = 'none';
    if (funnelBar) funnelBar.style.display = 'none';
    if (loadAllBanner) loadAllBanner.style.display = 'none';
    loading.style.display = 'flex';
    expandedId = null;
    allFeatures = [];
    stopPolling();
    hideProgressBar();
    currentPage = 1;

    fetch('/api/features/all?refresh=true')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            loading.style.display = 'none';
            if (btn) btn.classList.remove('spinning');
            if (data.error) throw new Error(data.error);

            allFeatures = data.features || data.classified_features || [];
            currentFunnelData = data;
            if (data.last_refreshed) {
                lastRefreshedTs = data.last_refreshed * 1000;
                updateLastRefreshedLabel();
            }
            startAutoRefreshTimer();
            if (stats) {
                var tierCounts = countTiers();
                stats.innerHTML =
                    '<span>Features: ' + allFeatures.length + ' total</span>' +
                    '<span id="stat-auto-skipped" class="tier-stat tier-auto">' + tierCounts.autoSkipped + ' auto-skipped</span>' +
                    '<span id="stat-ai-classified" class="tier-stat tier-ai">' + tierCounts.aiClassified + ' AI-classified</span>' +
                    '<span id="stat-unclassified" class="tier-stat tier-pending">' + tierCounts.unclassified + ' pending</span>';
                stats.style.display = 'flex';
            }
            updateTierStats();
            if (typeof renderFunnelBar === 'function') renderFunnelBar(data, 'showing');
            if (allFeatures.length === 0) {
                empty.innerHTML = '<h3>No features found</h3><p>Try refreshing or check your data sources.</p>';
                empty.style.display = 'block';
                return;
            }
            renderAll();
            startBatchClassification();
        })
        .catch(function(err) {
            loading.style.display = 'none';
            if (btn) btn.classList.remove('spinning');
            errEl.innerHTML = '<h3>Failed to refresh</h3><p>' + err.message + '</p>';
            errEl.style.display = 'block';
        });
}

function startAutoRefreshTimer() {
    if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    autoRefreshInterval = setInterval(function() {
        if (isAllTasksMode) return;
        fetch('/api/features/all')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) return;
                var newFeatures = data.features || [];
                if (data.last_refreshed) {
                    lastRefreshedTs = data.last_refreshed * 1000;
                    updateLastRefreshedLabel();
                }
                if (newFeatures.length !== allFeatures.length) {
                    allFeatures = newFeatures;
                    currentFunnelData = data;
                    renderAll();
                    if (typeof renderFunnelBar === 'function') renderFunnelBar(data, 'showing');
                    updateTierStats();
                }
            })
            .catch(function() {});
    }, AUTO_REFRESH_MS);
}

function countClassified() {
    var n = 0;
    for (var i = 0; i < allFeatures.length; i++) {
        if (allFeatures[i].classification) n++;
    }
    return n;
}

function countTiers() {
    var autoSkipped = 0, aiClassified = 0, unclassified = 0;
    for (var i = 0; i < allFeatures.length; i++) {
        var cl = allFeatures[i].classification;
        if (!cl || cl.unclassified) {
            unclassified++;
        } else if (cl.classification_method === 'quick_keyword') {
            autoSkipped++;
        } else {
            aiClassified++;
        }
    }
    return { autoSkipped: autoSkipped, aiClassified: aiClassified, unclassified: unclassified };
}

function updateTierStats() {
    var stats = document.getElementById('stats-row');
    if (!stats) return;
    var tierCounts = countTiers();
    stats.innerHTML =
        '<span>Features: ' + allFeatures.length + ' total</span>' +
        '<span id="stat-auto-skipped" class="tier-stat tier-auto">' + tierCounts.autoSkipped + ' auto-skipped</span>' +
        '<span id="stat-ai-classified" class="tier-stat tier-ai">' + tierCounts.aiClassified + ' AI-classified</span>' +
        '<span id="stat-unclassified" class="tier-stat tier-pending">' + tierCounts.unclassified + ' pending</span>';
}

function startBatchClassification() {
    fetch('/api/features/classify-batch-async', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.status === 'complete') return;
            classificationTotal = data.total || allFeatures.length;
            classificationDone = data.classified || 0;
            showProgressBar(classificationDone, classificationTotal);
            startPolling();
        })
        .catch(function(err) { console.warn('Batch classification start failed:', err.message); });
}

function startPolling() {
    if (pollInterval) return;
    pollInterval = setInterval(pollClassificationStatus, 3000);
}

function stopPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

function pollClassificationStatus() {
    fetch('/api/classifications/cache')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var cache = data.cache || {};
            var anyUpdated = false;
            for (var i = 0; i < allFeatures.length; i++) {
                var f = allFeatures[i];
                var fid = f.id || '';
                if (!f.classification && cache[fid]) {
                    f.classification = cache[fid];
                    anyUpdated = true;
                }
            }
            if (anyUpdated) {
                var hasActiveOverride = document.querySelector('.override-reason-row');
                if (!hasActiveOverride) { renderAll(); }
                updateStats();
            }

            fetch('/api/classifications/status')
                .then(function(r2) { return r2.json(); })
                .then(function(status) {
                    classificationTotal = status.total || allFeatures.length;
                    classificationDone = status.classified || 0;
                    if (status.in_progress) {
                        showProgressBar(classificationDone, classificationTotal);
                    } else {
                        var allDone = allFeatures.every(function(f) { return !!f.classification; });
                        if (allDone || !status.in_progress) { stopPolling(); fadeOutProgressBar(); }
                        else { showProgressBar(classificationDone, classificationTotal); }
                    }
                });
        })
        .catch(function(err) { console.warn('Poll error:', err.message); });
}

function showProgressBar(done, total) {
    var wrap = document.getElementById('progress-bar-wrap');
    var fill = document.getElementById('progress-bar-fill');
    var label = document.getElementById('progress-bar-label');
    wrap.classList.remove('fading');
    wrap.classList.add('visible');
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    fill.style.width = pct + '%';
    label.textContent = 'Classifying features\u2026 ' + done + '/' + total;
}

function hideProgressBar() {
    var wrap = document.getElementById('progress-bar-wrap');
    wrap.classList.remove('visible', 'fading');
}

function fadeOutProgressBar() {
    var wrap = document.getElementById('progress-bar-wrap');
    if (!wrap.classList.contains('visible')) return;
    var fill = document.getElementById('progress-bar-fill');
    fill.style.width = '100%';
    setTimeout(function() {
        wrap.classList.add('fading');
        setTimeout(function() { wrap.classList.remove('visible', 'fading'); }, 700);
    }, 400);
}

function updateStats() {
    updateTierStats();
}

function setCategoryFilter(cat, btn) {
    categoryFilter = cat;
    currentPage = 1;
    var pills = document.querySelectorAll('.cat-filter-pill');
    for (var i = 0; i < pills.length; i++) {
        pills[i].classList.remove('active', 'active-unclassified');
    }
    if (btn) {
        if (cat === 'unclassified') { btn.classList.add('active-unclassified'); }
        else { btn.classList.add('active'); }
    }
    renderAll();
    if (currentFunnelData) {
        var visible = (cat === 'all' || cat === 'unclassified')
            ? allFeatures
            : allFeatures.filter(function(f) { return featureMatchesCategory(f, cat); });
        currentFunnelData.filtered = visible.length;
        renderFunnelBar(currentFunnelData, 'showing');
    }
}

function applyFilters() { currentPage = 1; renderAll(); }

function getFilteredFeatures() {
    var minImp = parseInt(document.getElementById('importance-filter').value);
    var classifiedOnly = document.getElementById('classified-only-toggle').checked;
    var catFilter = categoryFilter;
    var classified = [];
    var unclassified = [];
    var asanaOnly = [];

    for (var i = 0; i < allFeatures.length; i++) {
        var f = allFeatures[i];
        var cl = f.classification;
        var isAsanaOnly = f.source === 'asana_only';
        var isReallyUnclassified = !cl || cl.unclassified;

        if (isReallyUnclassified) {
            if (classifiedOnly && !f._justAdded) continue;
            if (catFilter !== 'all' && catFilter !== 'unclassified') continue;
            if (isAsanaOnly) { asanaOnly.push(f); }
            else { unclassified.push(f); }
        } else {
            var score = cl.importance_score || 0;
            if (catFilter === 'unclassified') continue;
            if (catFilter !== 'all' && !featureMatchesCategory(f, catFilter)) continue;
            if (score < minImp) continue;
            if (isAsanaOnly) { asanaOnly.push(f); }
            else { classified.push(f); }
        }
    }

    classified.sort(function(a, b) {
        var aAdded = a._justAdded ? 1 : 0;
        var bAdded = b._justAdded ? 1 : 0;
        if (aAdded !== bAdded) return bAdded - aAdded;
        return ((b.classification || {}).importance_score || 0) - ((a.classification || {}).importance_score || 0);
    });
    unclassified.sort(function(a, b) {
        var aAdded = a._justAdded ? 1 : 0;
        var bAdded = b._justAdded ? 1 : 0;
        if (aAdded !== bAdded) return bAdded - aAdded;
        return (a.title || '').localeCompare(b.title || '');
    });
    asanaOnly.sort(function(a, b) { return (a.title || '').localeCompare(b.title || ''); });

    return { classified: classified, unclassified: unclassified, asanaOnly: asanaOnly };
}

function renderAll() {
    var list = document.getElementById('feature-list');
    list.querySelectorAll('.override-reason-row').forEach(function(row) {
        if (row._outsideClickHandler) {
            document.removeEventListener('click', row._outsideClickHandler);
        }
    });
    var result = getFilteredFeatures();
    var classified = result.classified;
    var unclassified = result.unclassified;
    var asanaOnly = result.asanaOnly;
    var prevExpanded = expandedId;

    var allFiltered = classified.concat(unclassified).concat(asanaOnly);
    var totalFiltered = allFiltered.length;

    list.innerHTML = '';

    if (totalFiltered === 0) {
        list.innerHTML = '<div class="empty-state" style="display:block;"><h3>No features match current filters</h3><p>Try adjusting the category or importance filter.</p></div>';
        renderPagination(0, 0, 0);
        return;
    }

    var totalPages = perPage === 0 ? 1 : Math.ceil(totalFiltered / perPage);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    var startIdx = perPage === 0 ? 0 : (currentPage - 1) * perPage;
    var endIdx = perPage === 0 ? totalFiltered : Math.min(startIdx + perPage, totalFiltered);

    var classifiedEnd = classified.length;
    var unclassifiedEnd = classifiedEnd + unclassified.length;
    var addedUnclDivider = false;
    var addedAoDivider = false;

    for (var idx = startIdx; idx < endIdx; idx++) {
        if (!addedUnclDivider && unclassified.length > 0 && idx >= classifiedEnd && idx < unclassifiedEnd) {
            addedUnclDivider = true;
            var divider = document.createElement('div');
            divider.className = 'section-divider';
            divider.innerHTML = '<span class="section-divider-label">Needs Classification (' + unclassified.length + ')</span><div class="section-divider-line"></div>';
            list.appendChild(divider);
        }
        if (!addedAoDivider && asanaOnly.length > 0 && idx >= unclassifiedEnd) {
            addedAoDivider = true;
            var aoDivider = document.createElement('div');
            aoDivider.className = 'section-divider';
            aoDivider.innerHTML = '<span class="section-divider-label">Not Yet Announced (' + asanaOnly.length + ')</span><div class="section-divider-line"></div>';
            list.appendChild(aoDivider);
        }

        var f = allFiltered[idx];
        var isUncl = idx >= classifiedEnd && idx < unclassifiedEnd;
        var isAo = idx >= unclassifiedEnd;
        var card = buildCard(f, isUncl || (isAo && !f.classification));
        if (f.id === prevExpanded) card.classList.add('expanded');
        list.appendChild(card);
    }

    renderPagination(totalFiltered, startIdx + 1, endIdx);
    attachShowMore();
}

function renderPagination(total, startNum, endNum) {
    var existing = document.getElementById('pagination-controls');
    if (existing) existing.remove();

    if (total <= 0) return;

    var totalPages = perPage === 0 ? 1 : Math.ceil(total / perPage);
    var wrap = document.createElement('div');
    wrap.id = 'pagination-controls';
    wrap.className = 'pagination-controls';

    var info = '<span class="pagination-info">Showing ' + startNum + '-' + endNum + ' of ' + total + ' features</span>';

    var perPageSelect = '<span class="pagination-perpage"><select id="perpage-select" onchange="changePerPage(this.value)">' +
        '<option value="25"' + (perPage === 25 ? ' selected' : '') + '>25 per page</option>' +
        '<option value="50"' + (perPage === 50 ? ' selected' : '') + '>50 per page</option>' +
        '<option value="100"' + (perPage === 100 ? ' selected' : '') + '>100 per page</option>' +
        '<option value="0"' + (perPage === 0 ? ' selected' : '') + '>All</option>' +
        '</select></span>';

    if (totalPages <= 1) {
        wrap.innerHTML = '<div class="pagination-row">' + info + perPageSelect + '</div>';
        document.getElementById('feature-list').after(wrap);
        return;
    }

    var buttons = '';
    buttons += '<button class="pg-btn' + (currentPage === 1 ? ' disabled' : '') + '" onclick="goToPage(1)">&laquo;</button>';
    buttons += '<button class="pg-btn' + (currentPage === 1 ? ' disabled' : '') + '" onclick="goToPage(' + (currentPage - 1) + ')">&lsaquo;</button>';

    var startPage = Math.max(1, currentPage - 2);
    var endPage = Math.min(totalPages, currentPage + 2);
    if (startPage > 1) buttons += '<span class="pg-ellipsis">...</span>';
    for (var p = startPage; p <= endPage; p++) {
        buttons += '<button class="pg-btn pg-num' + (p === currentPage ? ' pg-active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</button>';
    }
    if (endPage < totalPages) buttons += '<span class="pg-ellipsis">...</span>';

    buttons += '<button class="pg-btn' + (currentPage === totalPages ? ' disabled' : '') + '" onclick="goToPage(' + (currentPage + 1) + ')">&rsaquo;</button>';
    buttons += '<button class="pg-btn' + (currentPage === totalPages ? ' disabled' : '') + '" onclick="goToPage(' + totalPages + ')">&raquo;</button>';

    wrap.innerHTML = '<div class="pagination-row">' + info + '<div class="pg-buttons">' + buttons + '</div>' + perPageSelect + '</div>';
    document.getElementById('feature-list').after(wrap);
}

function goToPage(page) {
    var result = getFilteredFeatures();
    var total = result.classified.length + result.unclassified.length + result.asanaOnly.length;
    var totalPages = perPage === 0 ? 1 : Math.ceil(total / perPage);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderAll();
    var listEl = document.getElementById('feature-list');
    listEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function changePerPage(val) {
    var v = parseInt(val);
    if (v === 0) {
        var result = getFilteredFeatures();
        var total = result.classified.length + result.unclassified.length + result.asanaOnly.length;
        if (total > 100) {
            if (!confirm('Loading all ' + total + ' features on one page may be slow. Continue?')) {
                document.getElementById('perpage-select').value = perPage.toString();
                return;
            }
        }
    }
    perPage = v;
    currentPage = 1;
    renderAll();
    var listEl = document.getElementById('feature-list');
    listEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildCard(f, isUnclassified) {
    var c = f.classification || {};
    var score = c.importance_score || 0;
    var summary = c.marketing_summary || '';
    var channels = c.recommended_channels || [];
    var preFiltered = c.pre_filtered || false;
    var isOverridden = c.manual_override || false;
    var isAutoClassified = c.classification_method === 'quick_keyword';
    var matchedKeyword = c.matched_keyword || '';
    var fid = f.id || '';

    var card = document.createElement('div');
    card.className = 'feature-card' + (isUnclassified ? ' unclassified-card' : '') + (f._justAdded ? ' just-added' : '');
    card.dataset.fid = fid;

    var scoreBadgeClass, scoreBadgeContent;
    if (isUnclassified) {
        scoreBadgeClass = 'score-badge score-unclassified';
        scoreBadgeContent = '&mdash;';
    } else {
        scoreBadgeClass = 'score-badge score-' + Math.min(score, 5);
        scoreBadgeContent = score + (isOverridden ? '<span class="override-indicator" title="Manually overridden">&#9998;</span>' : '');
    }

    var catBadgesHtml = '';
    if (isUnclassified) {
        catBadgesHtml = '<span class="category-pill cat-unclassified">Unclassified</span>';
    } else {
        var cats = getCategories(f);
        catBadgesHtml = cats.map(function(cat) {
            var cls = ALL_CATS.indexOf(cat) !== -1 ? 'cat-' + cat : 'cat-default';
            return '<span class="category-pill ' + cls + '">' + (CAT_LABELS[cat] || cat.replace(/_/g, ' ')) + '</span>';
        }).join('');
    }

    var autoClassifiedPillHtml = '';
    if (isAutoClassified && !isOverridden) {
        autoClassifiedPillHtml = '<span class="auto-classified-pill" title="Auto-skipped: matched \'' + escHtml(matchedKeyword) + '\'">&#9889; Auto-classified</span>';
    }

    var sourcePillHtml = '';
    var src = f.source || '';
    if (src === 'slack+asana') {
        sourcePillHtml = '<span class="source-pill source-slack-asana">Slack + Asana</span>';
    } else if (src === 'slack_only') {
        sourcePillHtml = '<span class="source-pill source-slack-only">Slack only</span>';
    } else if (src === 'asana_only') {
        sourcePillHtml = '<span class="source-pill source-asana-only">Asana only</span>';
    }

    var versionHtml = '';
    var rv = f.release_version || {};
    if (rv.fe) versionHtml += '<span class="version-badge">FE ' + escHtml(rv.fe) + '</span>';
    if (rv.be) versionHtml += '<span class="version-badge">BE ' + escHtml(rv.be) + '</span>';

    var prefixHtml = '';
    if (f.source_prefix) {
        prefixHtml = '<span class="prefix-label">' + escHtml(f.source_prefix) + '</span>';
    }

    var summaryHtml;
    if (isUnclassified) {
        summaryHtml = '<div class="card-summary awaiting">Awaiting AI classification\u2026</div>';
    } else if (summary) {
        summaryHtml = '<div class="card-summary">' + escHtml(summary) + '</div>';
    } else {
        summaryHtml = '';
    }

    var channelHtml = '';
    if (!isUnclassified) {
        channels.forEach(function(ch) { channelHtml += '<span class="channel-pill">' + escHtml(ch) + '</span>'; });
    }

    var actionBtn;
    if (isUnclassified) {
        actionBtn = '<button class="btn-classify-now" data-fid="' + escAttr(fid) + '">' +
            '<span class="btn-spinner"></span><span class="btn-label">Classify</span></button>';
    } else {
        actionBtn = '<button class="btn-generate" data-fid="' + escAttr(fid) + '">Generate Content &rarr;</button>';
    }

    card.innerHTML =
        '<div class="card-top">' +
            '<div class="' + scoreBadgeClass + '">' + scoreBadgeContent + '</div>' +
            '<div class="card-body">' +
                '<div class="card-title-row">' +
                    '<span class="card-title">' + escHtml(f.title || 'Untitled') + '</span>' +
                    '<span class="chevron">&#9660;</span>' +
                '</div>' +
                '<div class="card-meta">' +
                    catBadgesHtml +
                    autoClassifiedPillHtml +
                    sourcePillHtml +
                    prefixHtml +
                    versionHtml +
                '</div>' +
                summaryHtml +
                '<div class="card-bottom-row">' +
                    '<div class="channel-pills">' + channelHtml + '</div>' +
                    '<div class="card-actions">' +
                        (isAutoClassified && !isOverridden ? '<button class="btn-reclassify" data-fid="' + escAttr(fid) + '" data-title="' + escAttr(f.title || '') + '" data-desc="' + escAttr((f.description || '').substring(0, 500)) + '"><span class="btn-spinner"></span><span class="btn-label">Reclassify with AI &#10024;</span></button>' : '') +
                        actionBtn +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="card-expanded-content">' +
            buildDescBlock(f) +
            buildMetaPills(f) +
        '</div>';

    card.addEventListener('click', function(e) {
        if (e.target.closest('.btn-generate') || e.target.closest('.btn-classify-now') ||
            e.target.closest('.show-more-link') || e.target.closest('.score-badge') ||
            e.target.closest('.score-popover') || e.target.closest('.cat-popover') ||
            e.target.closest('.override-reason-row') || e.target.closest('.card-meta')) return;
        toggleCard(card, fid);
    });

    if (!isUnclassified) {
        var scoreBadgeEl = card.querySelector('.score-badge');
        scoreBadgeEl.addEventListener('click', function(e) {
            e.stopPropagation();
            showScorePopover(fid, scoreBadgeEl);
        });

        var metaEl = card.querySelector('.card-meta');
        metaEl.addEventListener('click', function(e) {
            if (e.target.closest('.category-pill') || e.target.closest('.override-indicator')) {
                e.stopPropagation();
                showCatPopover(fid, metaEl);
            }
        });
    }

    var genBtn = card.querySelector('.btn-generate');
    if (genBtn) {
        genBtn.addEventListener('click', function(e) { e.stopPropagation(); generateContent(fid); });
    }

    var classifyBtn = card.querySelector('.btn-classify-now');
    if (classifyBtn) {
        classifyBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            classifySingle(fid, classifyBtn, card);
        });
    }

    var reclassifyBtn = card.querySelector('.btn-reclassify');
    if (reclassifyBtn) {
        reclassifyBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            reclassifyWithClaude(fid, reclassifyBtn, card);
        });
    }

    return card;
}

function reclassifyWithClaude(fid, btn, card) {
    var label = btn.querySelector('.btn-label');
    var spinner = btn.querySelector('.btn-spinner');
    label.textContent = 'Classifying...';
    spinner.style.display = 'inline-block';
    btn.disabled = true;

    fetch('/api/features/reclassify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            feature_id: fid,
            title: btn.dataset.title || '',
            description: btn.dataset.desc || ''
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success && data.classification) {
            for (var i = 0; i < allFeatures.length; i++) {
                if (allFeatures[i].id === fid) {
                    allFeatures[i].classification = data.classification;
                    break;
                }
            }
            renderAll();
            updateTierStats();
        } else {
            label.textContent = 'Reclassify with AI \u2728';
            spinner.style.display = 'none';
            btn.disabled = false;
        }
    })
    .catch(function() {
        label.textContent = 'Reclassify with AI \u2728';
        spinner.style.display = 'none';
        btn.disabled = false;
    });
}

function attachShowMore() {
    var links = document.querySelectorAll('.show-more-link');
    for (var i = 0; i < links.length; i++) {
        (function(link) {
            link.addEventListener('click', function(e) {
                e.stopPropagation();
                var fullText = link.getAttribute('data-full');
                var descText = link.parentElement.querySelector('.desc-text');
                if (link.textContent === 'Show more...') { descText.textContent = fullText; link.textContent = 'Show less'; }
                else { descText.textContent = fullText.substring(0, 500) + '...'; link.textContent = 'Show more...'; }
            });
        })(links[i]);
    }
}

function toggleCard(card, fid) {
    if (expandedId === fid) { card.classList.remove('expanded'); expandedId = null; return; }
    var prev = document.querySelector('.feature-card.expanded');
    if (prev) prev.classList.remove('expanded');
    card.classList.add('expanded');
    expandedId = fid;
}

function classifySingle(fid, btn, card) {
    btn.classList.add('classifying');
    btn.disabled = true;

    fetch('/api/features/' + encodeURIComponent(fid) + '/classify', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                showToast('Classification failed: ' + data.error, true);
                btn.classList.remove('classifying'); btn.disabled = false;
                return;
            }
            var cl = data.classification;
            for (var i = 0; i < allFeatures.length; i++) {
                if (allFeatures[i].id === fid) { allFeatures[i].classification = cl; break; }
            }
            updateStats();
            renderAll();
            var newCard = document.querySelector('[data-fid="' + fid + '"]');
            if (newCard) newCard.classList.add('just-classified');
        })
        .catch(function(err) {
            showToast('Error: ' + err.message, true);
            btn.classList.remove('classifying'); btn.disabled = false;
        });
}

function buildDescBlock(f) {
    var desc = f.description || '';
    if (!desc) return '';
    var truncated = desc.length > 500;
    var displayDesc = truncated ? desc.substring(0, 500) + '...' : desc;
    var html = '<div class="desc-block"><span class="desc-text">' + escHtml(displayDesc) + '</span>';
    if (truncated) html += '<br><span class="show-more-link" data-full="' + escAttr(desc) + '">Show more...</span>';
    html += '</div>';
    return html;
}

function buildMetaPills(f) {
    var pills = [];
    if (f.released) {
        pills.push('<span class="meta-pill released">Released &#10003;</span>');
    } else if (f.source === 'asana_only') {
        pills.push('<span class="meta-pill in-progress">Not yet announced</span>');
    }
    if (f.release_date) pills.push('<span class="meta-pill">' + escHtml(f.release_date) + '</span>');
    if ((f.total_reactions || 0) > 0) {
        var rxSummary = '';
        var bd = f.reactions_breakdown || {};
        if (typeof bd === 'object' && !Array.isArray(bd)) {
            var rxParts = [];
            for (var emoji in bd) { rxParts.push(':' + emoji + ': ' + bd[emoji]); }
            rxSummary = rxParts.join(' ');
        }
        pills.push('<span class="meta-pill">&#128640; ' + f.total_reactions + ' reactions' + (rxSummary ? ' (' + escHtml(rxSummary) + ')' : '') + '</span>');
    }
    if (f.engineer) pills.push('<span class="meta-pill">Eng: ' + escHtml(f.engineer) + '</span>');
    if (f.assignee) pills.push('<span class="meta-pill">Assignee: ' + escHtml(f.assignee) + '</span>');
    if (f.team) pills.push('<span class="meta-pill">Team: ' + escHtml(f.team) + '</span>');
    if (f.urgency_score) pills.push('<span class="meta-pill">Urgency: ' + f.urgency_score + '</span>');

    var links = [];
    if (f.slack_url) links.push('<a href="' + escAttr(f.slack_url) + '" target="_blank" rel="noopener">&#128172; Slack</a>');
    if (f.asana_url) links.push('<a href="' + escAttr(f.asana_url) + '" target="_blank" rel="noopener">&#128203; Asana</a>');
    var prUrls = f.github_pr_urls || [];
    if (f.github_url && f.github_url.indexOf('/pull/') !== -1 && prUrls.indexOf(f.github_url) === -1) {
        prUrls = [f.github_url].concat(prUrls);
    }
    for (var pi = 0; pi < prUrls.length; pi++) {
        var prUrl = prUrls[pi];
        var prMatch = prUrl.match(/\/pull\/(\d+)/);
        var prLabel = prMatch ? '&#128187; PR #' + prMatch[1] : '&#128187; GitHub PR';
        links.push('<a href="' + escAttr(prUrl) + '" target="_blank" rel="noopener">' + prLabel + '</a>');
    }
    var linksHtml = links.length > 0 ? '<div class="link-row">' + links.join('') + '</div>' : '';

    var noAsanaNote = '';
    if (f.asana_linked === false && f.source !== 'asana_only') {
        noAsanaNote = '<div class="no-asana-note">No Asana task linked</div>';
    }

    var autoClassNote = '';
    var cl = f.classification || {};
    if (cl.classification_method === 'quick_keyword' && cl.matched_keyword) {
        autoClassNote = '<div class="auto-class-note">Auto-skipped: matched keyword \'' + escHtml(cl.matched_keyword) + '\'. No Claude API call was used for this feature.</div>';
    }

    var html = '';
    if (autoClassNote) html += autoClassNote;
    if (pills.length > 0) html += '<div class="meta-pills">' + pills.join('') + '</div>';
    html += linksHtml + noAsanaNote;
    return html;
}

var CAT_DEFINITIONS = [
    { key: 'all', label: 'All', color: '#8899aa' },
    { key: 'new_feature', label: 'New Feature', color: '#00C9A7' },
    { key: 'improvement', label: 'Improvement', color: '#3b82f6' },
    { key: 'bug_fix', label: 'Bug Fix', color: '#ef4444' },
    { key: 'infrastructure', label: 'Infrastructure', color: '#6b7280' },
    { key: 'mobile', label: 'Mobile', color: '#a855f7' },
    { key: 'deprecation', label: 'Deprecation', color: '#f97316' }
];

function filterByCategory(cat) {
    var pill = document.querySelector('.cat-filter-pill[data-cat="' + cat + '"]');
    setCategoryFilter(cat, pill || document.querySelector('.cat-filter-pill'));
}

function showScorePopover(fid, badgeEl) {
    closeActivePopover();
    var f = null;
    for (var i = 0; i < allFeatures.length; i++) {
        if ((allFeatures[i].id || '') === fid) { f = allFeatures[i]; break; }
    }
    if (!f) return;
    var c = f.classification || {};
    var currentScore = c.importance_score || 0;

    var pop = document.createElement('div');
    pop.className = 'score-popover';
    [5,4,3,2,1].forEach(function(s) {
        var opt = document.createElement('div');
        opt.className = 'score-option score-' + s + (s === currentScore ? ' active' : '');
        opt.textContent = s;
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            if (s === currentScore) { closeActivePopover(); return; }
            applyOverride(fid, s, null);
            closeActivePopover();
        });
        pop.appendChild(opt);
    });

    badgeEl.appendChild(pop);
    activePopover = pop;
}

function showCatPopover(fid, metaEl) {
    closeActivePopover();
    var f = null;
    for (var i = 0; i < allFeatures.length; i++) {
        if ((allFeatures[i].id || '') === fid) { f = allFeatures[i]; break; }
    }
    if (!f) return;
    var currentCats = getCategories(f);

    var pop = document.createElement('div');
    pop.className = 'cat-popover';

    function refreshCatButtons() {
        pop.innerHTML = '';
        ALL_CATS.forEach(function(cat) {
            var isSelected = currentCats.indexOf(cat) !== -1;
            var btn = document.createElement('button');
            btn.className = 'cat-toggle' + (isSelected ? ' selected sel-' + cat : '');
            btn.innerHTML = (isSelected ? '<span class="cat-check">&#10003;</span> ' : '') + (CAT_LABELS[cat] || cat);
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var idx = currentCats.indexOf(cat);
                if (idx !== -1) {
                    if (currentCats.length <= 1) { showToast('At least one category required', true); return; }
                    currentCats.splice(idx, 1);
                } else {
                    currentCats.push(cat);
                }
                refreshCatButtons();
            });
            pop.appendChild(btn);
        });
    }
    refreshCatButtons();

    pop._commitOnClose = function() {
        var origCats = getCategories(f);
        var changed = origCats.length !== currentCats.length || origCats.some(function(c) { return currentCats.indexOf(c) === -1; });
        if (changed) applyOverride(fid, null, currentCats.slice());
    };

    metaEl.appendChild(pop);
    activePopover = pop;
}

function applyOverride(fid, newScore, newCats) {
    var f = null;
    for (var i = 0; i < allFeatures.length; i++) {
        if ((allFeatures[i].id || '') === fid) { f = allFeatures[i]; break; }
    }
    if (!f) return;
    var c = f.classification || {};

    if (!c._original_score && c._original_score !== 0) {
        c._original_score = c.importance_score;
        c._original_categories = getCategories(f).slice();
    }

    if (newScore !== null) c.importance_score = newScore;
    if (newCats !== null) { c.categories = newCats; c.category = newCats[0]; }
    c.manual_override = true;
    f.classification = c;

    expandedId = fid;
    renderAll();
    showReasonInput(fid, f, c);
}

function showReasonInput(fid, f, c) {
    var card = document.querySelector('.feature-card[data-fid="' + fid + '"]');
    if (!card) return;
    var existing = card.querySelector('.override-reason-row');
    if (existing) {
        if (existing._outsideClickHandler) {
            document.removeEventListener('click', existing._outsideClickHandler);
        }
        existing.remove();
    }

    var row = document.createElement('div');
    row.className = 'override-reason-row';
    row.innerHTML =
        '<input type="text" class="override-reason-input" placeholder="Why this change? (optional, helps AI learn)">' +
        '<button class="btn-save-reason">Save</button>';

    var cardBody = card.querySelector('.card-body');
    cardBody.appendChild(row);

    var input = row.querySelector('.override-reason-input');
    var saveBtn = row.querySelector('.btn-save-reason');
    input.focus();

    function doSave() {
        var reason = input.value.trim();
        saveBtn.textContent = 'Saving...';
        saveBtn.disabled = true;
        commitOverride(f, c, reason, function() {
            row.remove();
            var confirm = document.createElement('div');
            confirm.className = 'override-confirm';
            confirm.textContent = '\u2713 AI will learn from this';
            cardBody.appendChild(confirm);
        });
    }

    function cleanup() {
        document.removeEventListener('click', outsideClickHandler);
    }

    function dismissWithoutReason() {
        cleanup();
        commitOverride(f, c, '', function() {
            row.remove();
            var confirm = document.createElement('div');
            confirm.className = 'override-confirm';
            confirm.textContent = '\u2713 AI will learn from this';
            cardBody.appendChild(confirm);
        });
    }

    function outsideClickHandler(e) {
        if (row.contains(e.target)) return;
        if (input.value.trim() === '') {
            dismissWithoutReason();
        }
    }

    saveBtn.addEventListener('click', function(e) { e.stopPropagation(); cleanup(); doSave(); });
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.stopPropagation(); cleanup(); doSave(); return; }
        if (e.key === 'Escape') {
            e.stopPropagation();
            if (input.value.trim() === '') {
                dismissWithoutReason();
            } else {
                input.value = '';
            }
        }
    });
    row.addEventListener('click', function(e) { e.stopPropagation(); });

    row._outsideClickHandler = outsideClickHandler;
    setTimeout(function() {
        document.addEventListener('click', outsideClickHandler);
    }, 0);
}

function commitOverride(f, c, reason, onDone) {
    var payload = {
        feature_id: f.id || '',
        feature_title: f.title || '',
        original_classification: {
            category: (c._original_categories || [])[0] || c.category,
            categories: c._original_categories || [c.category],
            importance_score: c._original_score !== undefined ? c._original_score : c.importance_score,
            recommended_channels: c.recommended_channels,
            marketing_summary: c.marketing_summary
        },
        override_classification: {
            category: c.category,
            categories: c.categories || [c.category],
            importance_score: c.importance_score
        },
        reason: reason
    };

    fetch('/api/classification/override', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) { showToast('Error: ' + data.error, true); return; }
        c.recommended_channels = data.recommended_channels || c.recommended_channels;
        f.classification = c;
        var minImp = parseInt(document.getElementById('importance-filter').value);
        if (c.importance_score < minImp) { showToast('Feature moved out of current filter view', true); }
        else { showToast('Classification updated \u2014 AI will learn from this'); }
        renderAll();
        if (onDone) onDone();
    })
    .catch(function(err) { showToast('Error: ' + err.message, true); });
}

function generateContent(fid) {
    var feature = null;
    for (var i = 0; i < allFeatures.length; i++) {
        if (allFeatures[i].id === fid) { feature = allFeatures[i]; break; }
    }
    if (!feature) return;

    var channels = (feature.classification || {}).recommended_channels || [];
    if (channels.length === 0) channels = ['twitter', 'linkedin', 'inapp'];
    var btn = document.querySelector('[data-fid="' + fid + '"].btn-generate');
    if (!btn) return;
    var origText = btn.innerHTML;
    btn.innerHTML = 'Generating...';
    btn.disabled = true;

    fetch('/api/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ feature: feature, channels: channels })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.innerHTML = origText; btn.disabled = false;
        if (data.error) { alert('Generation failed: ' + data.error); return; }
        alert('Content generated for ' + channels.join(', ') + '! Check /test/review for full editing.');
    })
    .catch(function(err) { btn.innerHTML = origText; btn.disabled = false; alert('Error: ' + err.message); });
}

function escHtml(str) {
    if (!str) return '';
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function escAttr(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showToast(msg, isWarning) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast visible' + (isWarning ? ' warning' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.className = 'toast'; }, 3000);
}

function focusPasteBar() {
    var input = document.getElementById('paste-input');
    input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(function() { input.focus(); }, 300);
}

document.getElementById('paste-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitPasteBar(); }
});

function submitPasteBar() {
    var input = document.getElementById('paste-input');
    var status = document.getElementById('paste-status');
    var val = input.value.trim();
    if (!val) return;

    var isSlack = /slack\.com/.test(val);
    var isAsana = /asana\.com/.test(val);
    var isGithub = /github\.com/.test(val);
    var loadingMsg = 'Adding feature...';
    if (isSlack) loadingMsg = 'Fetching from Slack...';
    else if (isAsana) loadingMsg = 'Loading Asana task...';
    else if (isGithub) loadingMsg = 'Parsing PR...';

    input.disabled = true;
    status.textContent = loadingMsg;
    status.className = 'paste-status loading';
    status.style.display = 'block';

    fetch('/api/features/from-url', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ url: val })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        input.disabled = false;

        var features = [];
        if (data.results) {
            for (var i = 0; i < data.results.length; i++) {
                if (data.results[i].feature) features.push(data.results[i].feature);
            }
        } else if (data.feature) {
            features.push(data.feature);
        }

        if (features.length === 0) {
            status.textContent = data.error || "Couldn't extract feature from that URL. Try pasting the feature title instead.";
            status.className = 'paste-status error';
            return;
        }

        for (var j = 0; j < features.length; j++) {
            var f = features[j];
            if (!f.classification) {
                f.classification = { importance_score: 0, category: 'unknown', categories: ['unknown'], unclassified: true };
            }
            f._justAdded = true;
            allFeatures.unshift(f);
        }

        input.value = '';
        status.textContent = features.length === 1
            ? 'Added: ' + features[0].title
            : 'Added ' + features.length + ' features';
        status.className = 'paste-status success';
        setTimeout(function() { status.style.display = 'none'; }, 3000);

        renderAll();

        var firstCard = document.querySelector('.feature-card.just-added');
        if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

        setTimeout(function() {
            for (var k = 0; k < features.length; k++) { delete features[k]._justAdded; }
        }, 2500);
    })
    .catch(function(err) {
        input.disabled = false;
        status.textContent = 'Error: ' + err.message;
        status.className = 'paste-status error';
    });
}

checkHealth();
loadFeatures();
</script>
