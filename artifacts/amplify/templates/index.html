<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplify Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #1a1d29 0%, #252836 100%);
            border-bottom: 1px solid #2d3140;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #7c5cfc, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.625rem;
            border-radius: 999px;
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            font-weight: 500;
        }
        main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #c9cdd5;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }
        .card {
            background: #1a1d29;
            border: 1px solid #2d3140;
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: #4a4f63; }
        .card-title {
            font-size: 0.875rem;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .card-value {
            font-size: 2rem;
            font-weight: 700;
            color: #f0f2f5;
        }
        .card-sub {
            font-size: 0.8125rem;
            color: #6b7080;
            margin-top: 0.375rem;
        }
        .status-section { margin-bottom: 2.5rem; }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.25rem;
            background: #1a1d29;
            border: 1px solid #2d3140;
            border-radius: 10px;
            margin-bottom: 0.625rem;
        }
        .status-label { font-weight: 500; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }
        .dot-green { background: #34d399; box-shadow: 0 0 6px rgba(52, 211, 153, 0.5); }
        .dot-yellow { background: #fbbf24; box-shadow: 0 0 6px rgba(251, 191, 36, 0.5); }
        #health-status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: #8b8fa3; }
    </style>
</head>
<body>
    <header>
        <span class="logo">Amplify</span>
        <span class="badge" id="health-badge">checking...</span>
    </header>

    <main>
        <h2>Overview</h2>
        <div class="grid">
            <div class="card">
                <div class="card-title">API Status</div>
                <div class="card-value" id="api-status">--</div>
                <div class="card-sub">Health endpoint</div>
            </div>
            <div class="card">
                <div class="card-title">Version</div>
                <div class="card-value" id="app-version">--</div>
                <div class="card-sub">Current release</div>
            </div>
            <div class="card">
                <div class="card-title">Services</div>
                <div class="card-value" id="service-count">--</div>
                <div class="card-sub">Active integrations</div>
            </div>
        </div>

        <div class="status-section">
            <h2>Service Health</h2>
            <div class="status-row">
                <span class="status-label">AI Module</span>
                <span id="ai-status"><span class="status-dot dot-yellow"></span> Checking...</span>
            </div>
            <div class="status-row">
                <span class="status-label">Sources Module</span>
                <span id="sources-status"><span class="status-dot dot-yellow"></span> Checking...</span>
            </div>
        </div>
    </main>

    <script>
        async function fetchHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                document.getElementById('api-status').textContent = data.status === 'ok' ? 'Healthy' : 'Error';
                document.getElementById('health-badge').textContent = data.status === 'ok' ? 'Online' : 'Offline';
                document.getElementById('health-badge').style.background = data.status === 'ok'
                    ? 'rgba(52, 211, 153, 0.15)' : 'rgba(239, 68, 68, 0.15)';
                document.getElementById('health-badge').style.color = data.status === 'ok'
                    ? '#34d399' : '#ef4444';
            } catch {
                document.getElementById('api-status').textContent = 'Offline';
                document.getElementById('health-badge').textContent = 'Offline';
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/status');
                const data = await res.json();
                document.getElementById('app-version').textContent = data.version || '--';
                const services = data.services || {};
                const count = Object.keys(services).length;
                document.getElementById('service-count').textContent = count;

                function setServiceStatus(elId, status) {
                    const el = document.getElementById(elId);
                    const dotClass = status === 'ready' ? 'dot-green' : 'dot-yellow';
                    const label = status === 'ready' ? 'Ready' : 'Pending';
                    el.innerHTML = '<span class="status-dot ' + dotClass + '"></span> ' + label;
                }
                setServiceStatus('ai-status', services.ai);
                setServiceStatus('sources-status', services.sources);
            } catch {
                document.getElementById('app-version').textContent = '--';
            }
        }

        fetchHealth();
        fetchStatus();
        setInterval(fetchHealth, 30000);
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
