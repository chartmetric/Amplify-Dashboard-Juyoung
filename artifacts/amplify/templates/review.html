<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amplify — Content Review</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;line-height:1.6;padding:2rem;max-width:1400px;margin:0 auto}
h1{font-size:1.75rem;color:#222;margin-bottom:.25rem}
.subtitle{color:#777;font-size:1rem;margin-bottom:1.5rem}
h2{font-size:1.2rem;color:#444;margin:2rem 0 1rem}
.badge{display:inline-block;font-size:.7rem;font-weight:700;padding:.15rem .5rem;border-radius:12px;text-transform:uppercase;letter-spacing:.03em}
.badge-category{background:#e0f7f3;color:#00897b}
.badge-score{background:#fff3e0;color:#e65100}
.badge-chars{background:#e8eaf6;color:#3949ab;font-size:.75rem}
.badge-channel{background:#f3e5f5;color:#7b1fa2}

.feature-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;margin-bottom:1.5rem}
.feature-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1rem 1.25rem;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.feature-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#00C9A7}
.feature-card.selected{border-color:#00C9A7;box-shadow:0 0 0 2px #00C9A733}
.feature-card h3{font-size:.95rem;margin-bottom:.5rem;color:#222}
.feature-meta{font-size:.8rem;color:#666;margin-top:.5rem;line-height:1.5}
.feature-meta p{margin-bottom:.25rem}

.manual-form{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1.25rem;margin-bottom:2rem}
.manual-form input,.manual-form textarea{width:100%;border:1px solid #ddd;border-radius:6px;padding:.5rem .75rem;font-size:.9rem;font-family:inherit;margin-bottom:.75rem}
.manual-form textarea{min-height:80px;resize:vertical}
.btn{background:#00C9A7;color:#fff;border:none;border-radius:6px;padding:.5rem 1.25rem;font-size:.875rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:#00b396}
.btn:disabled{background:#ccc;cursor:not-allowed}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}
.btn-outline{background:transparent;color:#00C9A7;border:1.5px solid #00C9A7}
.btn-outline:hover{background:#e0f7f3}

.loading{text-align:center;padding:3rem;color:#999}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#00C9A7;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}

.classification{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
.classification h3{font-size:1rem;margin-bottom:.75rem}
.class-row{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:.5rem}
.class-detail{font-size:.85rem;color:#555}

.channel-selector{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
.channel-selector-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
.channel-selector-header h3{font-size:1rem;color:#333;margin:0}
.channel-chips{display:flex;flex-wrap:wrap;gap:.5rem}
.channel-chip{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .85rem;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid #ccc;background:#fff;color:#888;user-select:none}
.channel-chip:hover{border-color:#00C9A7;color:#555}
.channel-chip.active{background:#00C9A7;border-color:#00C9A7;color:#fff}
.channel-chip .chip-star{font-size:.7rem;opacity:.7}
.channel-chip.active .chip-star{opacity:1}
.generate-bar{display:flex;justify-content:flex-end;margin-top:1rem;gap:.5rem;align-items:center}
.generate-bar .selected-count{font-size:.85rem;color:#777}

.content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:1rem;margin-bottom:2rem}
.content-card{background:#fff;border:1px solid #e0e0e0;border-left:4px solid #ccc;border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.content-card[data-type="social"]{border-left-color:#00C9A7}
.content-card[data-type="email"]{border-left-color:#4caf50}
.content-card[data-type="internal"]{border-left-color:#ff9800}
.content-card[data-type="article"]{border-left-color:#9e9e9e}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border-bottom:1px solid #f0f0f0;background:#fafafa}
.card-header h4{font-size:.9rem;margin:0;color:#333}
.card-body{padding:1rem;flex:1;max-height:360px;overflow-y:auto;font-size:.9rem;white-space:pre-wrap;word-break:break-word;color:#333}
.card-body a{color:#3b82f6;text-decoration:underline;text-underline-offset:2px}
.card-body a:hover{color:#60a5fa}
.card-footer{display:flex;gap:.5rem;padding:.75rem 1rem;border-top:1px solid #f0f0f0;align-items:center;background:#fafafa}
.card-footer input{flex:1;border:1px solid #ddd;border-radius:6px;padding:.35rem .6rem;font-size:.8rem;font-family:inherit}
.card-regen-spinner{display:none;width:18px;height:18px;border:2px solid #e0e0e0;border-top-color:#00C9A7;border-radius:50%;animation:spin .7s linear infinite}
.trimmed-note{color:#e65100;font-size:.75rem;margin-top:.5rem;font-style:italic}

.error-msg{background:#ffebee;color:#c62828;padding:.75rem 1rem;border-radius:8px;margin:1rem 0;font-size:.9rem}
.empty-state{text-align:center;color:#999;padding:2rem;font-size:.95rem}

.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem}
.fetch-btn{margin-top:.25rem}
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <h1>Content Review</h1>
    <p class="subtitle">Select a feature or enter one manually, then review generated content across all channels.</p>
  </div>
  <button class="btn fetch-btn" onclick="fetchFeatures()">Refresh Features</button>
</div>

<div id="features-loading" class="loading" style="display:none"><div class="spinner"></div><br>Loading features from Asana &amp; Slack...</div>
<div id="features-error" style="display:none"></div>
<div id="features-grid" class="feature-grid"></div>

<details style="margin-bottom:2rem">
  <summary style="cursor:pointer;color:#00897b;font-weight:600;font-size:.9rem;margin-bottom:.5rem">Manual Input (fallback)</summary>
  <div class="manual-form">
    <input type="text" id="manual-title" placeholder="Feature title">
    <textarea id="manual-desc" placeholder="Feature description"></textarea>
    <button class="btn" onclick="generateManual()">Generate Content</button>
  </div>
</details>

<div id="gen-loading" class="loading" style="display:none"><div class="spinner"></div><br>Classifying feature and generating content...</div>
<div id="gen-error" style="display:none"></div>

<div id="classification-section" style="display:none">
  <h2>Classification</h2>
  <div id="classification-card" class="classification"></div>
</div>

<div id="feature-url-section" style="display:none">
  <div class="channel-selector" style="margin-top:1rem">
    <label for="feature-url-input" style="font-size:.9rem;font-weight:600;color:#333;display:block;margin-bottom:.4rem">Feature URL <span style="font-weight:400;color:#999">(embedded as hyperlink in generated content)</span></label>
    <input type="text" id="feature-url-input" placeholder="https://app.chartmetric.com/..." style="width:100%;border:1px solid #ddd;border-radius:6px;padding:.5rem .75rem;font-size:.9rem;font-family:inherit">
  </div>
</div>

<div id="channel-selector-section" style="display:none">
  <h2>Channels</h2>
  <div class="channel-selector">
    <div class="channel-selector-header">
      <h3>Select channels to generate</h3>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-sm btn-outline" onclick="selectAllChannels()">Select All</button>
        <button class="btn btn-sm btn-outline" onclick="deselectAllChannels()">Deselect All</button>
      </div>
    </div>
    <div id="channel-chips" class="channel-chips"></div>
    <div class="generate-bar">
      <span class="selected-count" id="selected-count"></span>
      <button class="btn" id="generate-btn" onclick="generateForSelectedChannels()">Generate Content</button>
    </div>
  </div>
</div>

<div id="content-section" style="display:none">
  <h2>Generated Content</h2>
  <div id="content-grid" class="content-grid"></div>
</div>

<script>
var CHANNEL_TYPES = {
  twitter: 'social', linkedin: 'social',
  email_newsletter: 'email', email_standalone: 'email',
  inapp: 'internal', notion_monthly: 'internal',
  article_hmc: 'article'
};

var allFeatures = [];
var selectedFeature = null;
var allChannels = [];
var selectedChannels = {};
var recommendedChannels = [];

async function fetchChannels() {
  try {
    var res = await fetch('/api/channels');
    var data = await res.json();
    allChannels = (data.channels || []).filter(function(c) { return c.enabled; });
  } catch (e) {
    console.error('Failed to fetch channels:', e);
  }
}

function renderChannelChips() {
  var container = document.getElementById('channel-chips');
  container.innerHTML = '';
  allChannels.forEach(function(ch) {
    var chip = document.createElement('span');
    chip.className = 'channel-chip' + (selectedChannels[ch.key] ? ' active' : '');
    chip.setAttribute('data-key', ch.key);

    var label = document.createTextNode(ch.display_name);
    chip.appendChild(label);

    if (recommendedChannels.indexOf(ch.key) !== -1) {
      var star = document.createElement('span');
      star.className = 'chip-star';
      star.textContent = ' \u2605 rec';
      chip.appendChild(star);
    }

    chip.addEventListener('click', function() {
      selectedChannels[ch.key] = !selectedChannels[ch.key];
      chip.classList.toggle('active', selectedChannels[ch.key]);
      updateSelectedCount();
    });

    container.appendChild(chip);
  });
  updateSelectedCount();
}

function updateSelectedCount() {
  var count = Object.keys(selectedChannels).filter(function(k) { return selectedChannels[k]; }).length;
  document.getElementById('selected-count').textContent = count + ' of ' + allChannels.length + ' selected';
  document.getElementById('generate-btn').disabled = count === 0;
}

function selectAllChannels() {
  allChannels.forEach(function(ch) { selectedChannels[ch.key] = true; });
  renderChannelChips();
}

function deselectAllChannels() {
  allChannels.forEach(function(ch) { selectedChannels[ch.key] = false; });
  renderChannelChips();
}

function getSelectedChannelKeys() {
  return Object.keys(selectedChannels).filter(function(k) { return selectedChannels[k]; });
}

async function fetchFeatures() {
  var grid = document.getElementById('features-grid');
  var loading = document.getElementById('features-loading');
  var errEl = document.getElementById('features-error');
  grid.innerHTML = '';
  errEl.style.display = 'none';
  loading.style.display = 'block';
  try {
    var res = await fetch('/api/features/classified?limit=40');
    var data = await res.json();
    if (data.error) throw new Error(data.error);
    allFeatures = data.classified_features || [];
    renderFeatures();
  } catch (e) {
    errEl.innerHTML = '<div class="error-msg">Failed to load features: ' + esc(e.message) + '</div>';
    errEl.style.display = 'block';
  } finally {
    loading.style.display = 'none';
  }
}

function renderFeatures() {
  var grid = document.getElementById('features-grid');
  if (!allFeatures.length) {
    grid.innerHTML = '<div class="empty-state">No features found</div>';
    return;
  }
  grid.innerHTML = allFeatures.map(function(f, i) {
    var c = f.classification || {};
    return '<div class="feature-card" data-idx="' + i + '" onclick="selectFeature(' + i + ')">' +
      '<h3>' + esc(f.title || 'Untitled') + '</h3>' +
      '<div>' +
        '<span class="badge badge-category">' + esc(c.category || 'unknown') + '</span> ' +
        '<span class="badge badge-score">Score: ' + (c.importance_score || '?') + '</span>' +
      '</div>' +
      '<div class="feature-meta">' +
        (c.importance_score_reason ? '<p><strong>Why:</strong> ' + esc(c.importance_score_reason) + '</p>' : '') +
        (c.marketing_summary ? '<p><strong>Summary:</strong> ' + esc(c.marketing_summary) + '</p>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function selectFeature(idx) {
  var f = allFeatures[idx];
  if (!f) return;
  document.querySelectorAll('.feature-card').forEach(function(c) { c.classList.remove('selected'); });
  var card = document.querySelector('.feature-card[data-idx="' + idx + '"]');
  if (card) card.classList.add('selected');
  selectedFeature = f;

  var cls = f.classification || {};
  renderClassification(cls);
  showChannelSelector(cls.recommended_channels || []);
}

function generateManual() {
  var title = document.getElementById('manual-title').value.trim();
  var desc = document.getElementById('manual-desc').value.trim();
  if (!title) return alert('Please enter a title');
  var feature = {id: 'manual-' + Date.now(), title: title, description: desc};
  selectedFeature = feature;
  renderClassification({});
  showChannelSelector([]);
}

function showChannelSelector(recommended) {
  recommendedChannels = recommended || [];
  selectedChannels = {};
  allChannels.forEach(function(ch) {
    selectedChannels[ch.key] = recommendedChannels.indexOf(ch.key) !== -1;
  });
  renderChannelChips();
  var urlInput = document.getElementById('feature-url-input');
  urlInput.value = '';
  document.getElementById('feature-url-section').style.display = 'block';
  document.getElementById('channel-selector-section').style.display = 'block';
  document.getElementById('content-section').style.display = 'none';
}

async function generateForSelectedChannels() {
  if (!selectedFeature) return;
  var channels = getSelectedChannelKeys();
  if (!channels.length) return alert('Select at least one channel');

  var loading = document.getElementById('gen-loading');
  var errEl = document.getElementById('gen-error');
  var contentSection = document.getElementById('content-section');

  contentSection.style.display = 'none';
  errEl.style.display = 'none';
  loading.style.display = 'block';

  try {
    var res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({feature: Object.assign({}, selectedFeature, {feature_url: document.getElementById('feature-url-input').value.trim() || null}), channels: channels})
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error);

    if (data.classification && !selectedFeature.classification) {
      selectedFeature.classification = data.classification;
    }
    renderContent(data.generated_content || {});
  } catch (e) {
    errEl.innerHTML = '<div class="error-msg">Generation failed: ' + esc(e.message) + '</div>';
    errEl.style.display = 'block';
  } finally {
    loading.style.display = 'none';
  }
}

function renderClassification(cls) {
  var section = document.getElementById('classification-section');
  var card = document.getElementById('classification-card');
  if (!cls || !cls.category) {
    section.style.display = 'none';
    return;
  }
  var channels = (cls.recommended_channels || []).map(function(c) { return '<span class="badge badge-channel">' + esc(c) + '</span>'; }).join(' ');
  card.innerHTML =
    '<div class="class-row">' +
      '<span class="badge badge-category">' + esc(cls.category) + '</span>' +
      '<span class="badge badge-score">Importance: ' + (cls.importance_score || '?') + '/5</span>' +
    '</div>' +
    (cls.importance_score_reason ? '<p class="class-detail"><strong>Reason:</strong> ' + esc(cls.importance_score_reason) + '</p>' : '') +
    (cls.marketing_summary ? '<p class="class-detail"><strong>Marketing Summary:</strong> ' + esc(cls.marketing_summary) + '</p>' : '') +
    (cls.target_audience ? '<p class="class-detail"><strong>Target Audience:</strong> ' + esc(cls.target_audience) + '</p>' : '') +
    (channels ? '<p class="class-detail" style="margin-top:.5rem"><strong>Recommended Channels:</strong> ' + channels + '</p>' : '');
  section.style.display = 'block';
}

function renderContent(content) {
  var section = document.getElementById('content-section');
  var grid = document.getElementById('content-grid');
  var keys = Object.keys(content);
  if (!keys.length) {
    grid.innerHTML = '<div class="empty-state">No content generated</div>';
    section.style.display = 'block';
    return;
  }
  grid.innerHTML = '';
  keys.forEach(function(ch) {
    var item = content[ch];
    var type = CHANNEL_TYPES[ch] || 'article';
    var displayName = item.channel_display_name || ch;
    var charCount = item.char_count || (item.content || '').length;
    var maxChars = item.max_chars || '?';

    var card = document.createElement('div');
    card.className = 'content-card';
    card.setAttribute('data-type', type);
    card.setAttribute('data-channel', ch);

    var header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = '<h4>' + esc(displayName) + '</h4><span class="badge badge-chars">' + charCount + ' / ' + maxChars + ' chars</span>';
    card.appendChild(header);

    var body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = simpleMarkdown(item.content || item.error || 'No content');
    card.appendChild(body);

    if (item.was_trimmed) {
      var note = document.createElement('div');
      note.className = 'trimmed-note';
      note.style.padding = '0 1rem';
      note.textContent = 'Content was trimmed to fit character limit';
      card.appendChild(note);
    }

    var footer = document.createElement('div');
    footer.className = 'card-footer';

    var input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'Feedback for regeneration...';
    footer.appendChild(input);

    var spinner = document.createElement('div');
    spinner.className = 'card-regen-spinner';
    footer.appendChild(spinner);

    var btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.textContent = 'Regenerate';
    btn.addEventListener('click', function() {
      regenerate(ch, card, body, input, spinner);
    });
    footer.appendChild(btn);

    card.appendChild(footer);
    grid.appendChild(card);
  });
  section.style.display = 'block';
}

async function regenerate(channel, card, body, input, spinner) {
  if (!selectedFeature) {
    console.error('No feature selected');
    return;
  }
  var feedback = input.value.trim();
  spinner.style.display = 'inline-block';

  try {
    var res = await fetch('/api/generate/single', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({feature: selectedFeature, channel: channel, feedback: feedback})
    });
    var data = await res.json();
    if (data.error) throw new Error(data.error);

    body.innerHTML = simpleMarkdown(data.content || 'No content');
    var charCount = data.char_count || (data.content || '').length;
    var maxChars = data.max_chars || '?';
    var badge = card.querySelector('.badge-chars');
    if (badge) badge.textContent = charCount + ' / ' + maxChars + ' chars';

    var existingTrimNote = card.querySelector('.trimmed-note');
    if (existingTrimNote) existingTrimNote.remove();
    if (data.was_trimmed) {
      var note = document.createElement('div');
      note.className = 'trimmed-note';
      note.style.padding = '0 1rem';
      note.textContent = 'Content was trimmed to fit character limit';
      card.insertBefore(note, card.querySelector('.card-footer'));
    }

    input.value = '';
  } catch (e) {
    console.error('Regeneration failed:', e);
    body.innerHTML = esc('Regeneration failed: ' + e.message);
  } finally {
    spinner.style.display = 'none';
  }
}

function esc(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function getVideoThumbnail(url) {
  var ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
  if (ytMatch) return 'https://img.youtube.com/vi/' + ytMatch[1] + '/hqdefault.jpg';
  var vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vimeoMatch) return 'https://vumbnail.com/' + vimeoMatch[1] + '.jpg';
  return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect width="320" height="180" rx="8" fill="%23e0e0e0"/><text x="160" y="95" text-anchor="middle" font-family="sans-serif" font-size="14" fill="%23999">Video</text></svg>');
}

function simpleMarkdown(text) {
  var html = esc(text);
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(m, text, url) {
    if (/^https?:\/\//i.test(url) || /^mailto:/i.test(url)) {
      return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + text + '</a>';
    }
    return text;
  });
  html = html.replace(/\[video:\s*([^\]]+)\]/g, function(m, url) {
    url = url.trim();
    if (!/^https?:\/\//i.test(url)) return '<p style="color:#999;font-style:italic;">[video: invalid URL]</p>';
    var thumbUrl = getVideoThumbnail(url);
    return '<div style="margin:8px 0;text-align:center;">' +
      '<a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer" style="display:inline-block;position:relative;text-decoration:none;">' +
      '<img src="' + esc(thumbUrl) + '" alt="Video thumbnail" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:cover;display:block;">' +
      '<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(0,0,0,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;">' +
      '<span style="width:0;height:0;border-style:solid;border-width:10px 0 10px 18px;border-color:transparent transparent transparent #fff;margin-left:3px;display:inline-block;"></span>' +
      '</span>' +
      '</a>' +
      '</div>';
  });
  html = html.replace(/\[image:\s*([^\]]+)\]/g, function(m, name) {
    name = name.trim();
    if (/^https?:\/\//i.test(name)) {
      return '<div style="margin:8px 0;"><img src="' + esc(name) + '" alt="Image" style="max-width:100%;max-height:200px;border-radius:8px;object-fit:cover;"></div>';
    }
    return '<p style="color:#999;font-style:italic;">[image: ' + esc(name) + ']</p>';
  });
  html = html.replace(/\n/g, '<br>');
  return html;
}

fetchChannels();
fetchFeatures();
</script>
</body>
</html>
